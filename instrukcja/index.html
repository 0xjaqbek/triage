CONTENT.pl = '<h1>Instrukcja obs\u0142ugi TRIAGE MCI</h1>\
<h2>1. Czym jest TRIAGE MCI</h2>\
<p>TRIAGE MCI to aplikacja webowa (PWA) do segregacji i zarz\u0105dzania zdarzeniem masowym (MCI) oparta na algorytmie START. Umo\u017Cliwia:</p>\
<ul>\
<li>Klasyfikacj\u0119 pacjent\u00F3w w 4 kategoriach (T1\u2013T4)</li>\
<li>Zarz\u0105dzanie transportem do szpitali</li>\
<li>\u015Aledzenie pojemno\u015Bci szpitali</li>\
<li>Generowanie i wysy\u0142anie raport\u00F3w</li>\
<li>Import danych od dyspozytora</li>\
</ul>\
<p>Aplikacja dzia\u0142a w pe\u0142ni offline. Wszystkie dane przechowywane s\u0105 wy\u0142\u0105cznie na urz\u0105dzeniu u\u017Cytkownika \u2014 \u017Cadne informacje nie s\u0105 wysy\u0142ane na zewn\u0119trzne serwery.</p>\
<p>Obs\u0142uguje 7 j\u0119zyk\u00F3w: polski, angielski, w\u0142oski, francuski, niemiecki, czeski, portugalski.</p>\
<hr>\
<h2>2. Rozpocz\u0119cie zdarzenia</h2>\
<h3>Ekran startowy</h3>\
<p>Po uruchomieniu aplikacji pojawi si\u0119 ekran konfiguracji zdarzenia:</p>\
<ol>\
<li><strong>Wyb\u00F3r j\u0119zyka</strong> \u2014 selektor u g\u00F3ry ekranu. Zmiana j\u0119zyka natychmiast t\u0142umaczy ca\u0142y interfejs.</li>\
<li><strong>Nazwa zdarzenia</strong> \u2014 pole obowi\u0105zkowe. Wpisz lokalizacj\u0119 i typ zdarzenia (np. \u201EWypadek A4 km 312\u201D). Pojawi si\u0119 w raportach.</li>\
<li><strong>KAM</strong> \u2014 pole opcjonalne. Kieruj\u0105cy Akcj\u0105 Medyczn\u0105 \u2014 imi\u0119 i nazwisko osoby koordynuj\u0105cej dzia\u0142ania na miejscu.</li>\
<li><strong>Poka\u017C podpowiedzi</strong> \u2014 prze\u0142\u0105cznik w\u0142\u0105czaj\u0105cy dymki z kontekstowymi wskaz\u00F3wkami w ca\u0142ej aplikacji. Przydatne przy pierwszym u\u017Cyciu.</li>\
<li><strong>ROZPOCZNIJ TRIAGE</strong> \u2014 rozpoczyna zdarzenie i uruchamia zegar.</li>\
</ol>\
<h3>Wznowienie zdarzenia</h3>\
<p>Je\u015Bli w pami\u0119ci urz\u0105dzenia istnieje zapisane zdarzenie, przy uruchomieniu pojawi si\u0119 opcja:</p>\
<ul>\
<li><strong>KONTYNUUJ</strong> \u2014 wznawia zapisane zdarzenie ze wszystkimi danymi</li>\
<li><strong>NOWE ZDARZENIE</strong> \u2014 kasuje poprzednie dane i rozpoczyna od nowa</li>\
</ul>\
<hr>\
<h2>3. Segregacja (algorytm START)</h2>\
<h3>Nawigacja</h3>\
<p>Aplikacja ma 3 zak\u0142adki w g\u00F3rnej cz\u0119\u015Bci ekranu:</p>\
<ul>\
<li><strong>SEGREGACJA</strong> \u2014 klasyfikacja pacjent\u00F3w</li>\
<li><strong>DYSPONOWANIE</strong> \u2014 transport i zarz\u0105dzanie</li>\
<li><strong>RAPORT</strong> \u2014 podsumowanie i eksport</li>\
</ul>\
<p>Pasek statystyk pod nawigacj\u0105 pokazuje liczb\u0119 pacjent\u00F3w w ka\u017Cdej kategorii: \uD83D\uDD34 T1, \uD83D\uDFE1 T2, \uD83D\uDFE2 T3, \u26AB T4 oraz sum\u0119.</p>\
<h3>Kreator segregacji START</h3>\
<p>Kreator prowadzi przez 6-krokowy algorytm START. Na ka\u017Cdym kroku odpowiadasz TAK lub NIE:</p>\
<p><strong>Krok 1 \u2014 Czy pacjent chodzi?</strong></p>\
<ul>\
<li>TAK \u2192 T3 Zielony (odroczony)</li>\
<li>NIE \u2192 przejd\u017A do kroku 2</li>\
</ul>\
<p><strong>Krok 2 \u2014 Czy oddycha spontanicznie?</strong></p>\
<ul>\
<li>TAK \u2192 przejd\u017A do kroku 4 (ocena cz\u0119sto\u015Bci oddech\u00F3w)</li>\
<li>NIE \u2192 przejd\u017A do kroku 3</li>\
</ul>\
<p><strong>Krok 3 \u2014 Udro\u017Cnij drogi oddechowe. Czy oddycha po udro\u017Cnieniu?</strong></p>\
<ul>\
<li>TAK \u2192 T1 Czerwony (natychmiastowy)</li>\
<li>NIE \u2192 T4 Czarny (zgon)</li>\
</ul>\
<p><strong>Krok 4 \u2014 Czy cz\u0119sto\u015B\u0107 oddech\u00F3w jest prawid\u0142owa (\u2264 30/min)?</strong></p>\
<ul>\
<li>TAK \u2192 przejd\u017A do kroku 5</li>\
<li>NIE \u2192 T1 Czerwony (natychmiastowy)</li>\
</ul>\
<p><strong>Krok 5 \u2014 Czy nawr\u00F3t kapilarny jest prawid\u0142owy (\u2264 2 sek.) i t\u0119tno na tt. promieniowej obecne?</strong></p>\
<ul>\
<li>TAK \u2192 przejd\u017A do kroku 6</li>\
<li>NIE \u2192 T1 Czerwony (natychmiastowy)</li>\
</ul>\
<p><strong>Krok 6 \u2014 Czy spe\u0142nia proste polecenia?</strong></p>\
<ul>\
<li>TAK \u2192 T2 \u017B\u00F3\u0142ty (pilny)</li>\
<li>NIE \u2192 T1 Czerwony (natychmiastowy)</li>\
</ul>\
<p>Ka\u017Cde pytanie ma podpowied\u017A (hint) widoczn\u0105 pod pytaniem \u2014 opisuje jak oceni\u0107 dany parametr.</p>\
<h3>Karta wyniku</h3>\
<p>Po zako\u0144czeniu segregacji pojawia si\u0119 karta wyniku z:</p>\
<ul>\
<li><strong>Kolorowy znacznik</strong> \u2014 du\u017Cy kwadrat z kategori\u0105 (T1/T2/T3/T4)</li>\
<li><strong>\u015Acie\u017Cka decyzyjna</strong> \u2014 pokazuje przebieg algorytmu</li>\
<li><strong>P\u0142e\u0107</strong> \u2014 przyciski M (m\u0119\u017Cczyzna), K (kobieta), ? (nieznana)</li>\
<li><strong>Wiek</strong> \u2014 pole numeryczne z przyciskami -5, -1, +1, +5 (zakres 0\u2013150)</li>\
<li><strong>Obra\u017Cenia cia\u0142a</strong> \u2014 przycisk otwieraj\u0105cy diagram obra\u017Ce\u0144 (patrz sekcja 4)</li>\
<li><strong>Notatki</strong> \u2014 pole na dodatkowe informacje (obra\u017Cenia, mechanizm urazu itp.)</li>\
</ul>\
<p>Dost\u0119pne akcje:</p>\
<ul>\
<li><strong>\u2713 ZATWIERD\u0179 PACJENTA</strong> \u2014 dodaje pacjenta do listy</li>\
<li><strong>\u21BA OD NOWA</strong> \u2014 resetuje kreator do kroku 1</li>\
<li><strong>ZMIE\u0143 KOLOR R\u0118CZNIE</strong> \u2014 otwiera rz\u0105d 4 przycisk\u00F3w (T1\u2013T4) do r\u0119cznej zmiany kategorii</li>\
</ul>\
<h3>Lista pacjent\u00F3w na miejscu</h3>\
<p>Poni\u017Cej kreatora wy\u015Bwietla si\u0119 lista \u201EPacjenci na miejscu\u201D posortowana wg priorytetu (T1 \u2192 T2 \u2192 T3 \u2192 T4).</p>\
<p>Ka\u017Cda karta pacjenta zawiera:</p>\
<ul>\
<li>Kolorowy znacznik (np. P-001)</li>\
<li>Kategori\u0119, p\u0142e\u0107/wiek, czas rejestracji</li>\
<li>Pole notatek (edytowalne)</li>\
<li>Przycisk obra\u017Ce\u0144 (\uD83E\uDE7B) z podsumowaniem</li>\
<li>4 kropki retria\u017Cu (T1\u2013T4) \u2014 kliknij aby zmieni\u0107 kategori\u0119</li>\
<li>Przycisk usuni\u0119cia (\u2715)</li>\
<li>Znacznik retria\u017Cu (\u21BAn) je\u015Bli kategoria by\u0142a zmieniana</li>\
</ul>\
<h3>Lista w transporcie</h3>\
<p>Sekcja \u201EW transporcie\u201D pojawia si\u0119 gdy pacjenci s\u0105 w drodze do szpitala. Ka\u017Cda karta pokazuje:</p>\
<ul>\
<li>Znacznik pacjenta z kolorem kategorii</li>\
<li>Tras\u0119: Zesp\u00F3\u0142 \u2192 Szpital \u2192 czas wyjazdu</li>\
<li>Przycisk \u201Ezmie\u0144\u201D \u2014 zmiana szpitala docelowego</li>\
<li>Przycisk \u201E\u2713 Dostarczony\u201D \u2014 oznacza dostarczenie i zwalnia zesp\u00F3\u0142 ZRM</li>\
</ul>\
<hr>\
<h2>4. Diagram obra\u017Ce\u0144 cia\u0142a</h2>\
<p>Przycisk \u201E\uD83E\uDE7B Obra\u017Cenia cia\u0142a\u201D otwiera interaktywny diagram cia\u0142a.</p>\
<h3>Widok diagramu</h3>\
<p>Wy\u015Bwietlane s\u0105 dwa zarysy cia\u0142a obok siebie:</p>\
<ul>\
<li><strong>PRZ\u00D3D</strong> (front) \u2014 g\u0142owa, klatka piersiowa, brzuch, ramiona, nogi</li>\
<li><strong>TY\u0141</strong> (back) \u2014 g\u0142owa, g\u00F3rna cz\u0119\u015B\u0107 plec\u00F3w, dolna cz\u0119\u015B\u0107 plec\u00F3w, ramiona, nogi</li>\
</ul>\
<p>Po bokach widoczne s\u0105 oznaczenia stron: <strong>L</strong> (lewa) i <strong>P</strong> (prawa), odwr\u00F3cone dla widoku ty\u0142u.</p>\
<p>Kliknij na stref\u0119 cia\u0142a aby j\u0105 wybra\u0107.</p>\
<h3>Panel obra\u017Ce\u0144 strefy</h3>\
<p>Po wybraniu strefy otwiera si\u0119 panel z 7 typami uraz\u00F3w do zaznaczenia:</p>\
<ul>\
<li>Z\u0142amanie</li>\
<li>Krwawienie</li>\
<li>Oparzenie</li>\
<li>Rana</li>\
<li>Opuchlizna</li>\
<li>B\u00F3l</li>\
<li>Amputacja</li>\
</ul>\
<p>Zaznaczone typy oznaczone s\u0105 \u2713. Ka\u017Cdy mo\u017Cna w\u0142\u0105czy\u0107/wy\u0142\u0105czy\u0107 klikni\u0119ciem.</p>\
<p>Na dole panelu:</p>\
<ul>\
<li><strong>\u2715 NIE</strong> \u2014 odrzuca zmiany w tej strefie</li>\
<li><strong>\u2713 TAK</strong> \u2014 zatwierdza obra\u017Cenia dla wybranej strefy</li>\
</ul>\
<h3>Zatwierdzanie diagramu</h3>\
<p>Po zaznaczeniu obra\u017Ce\u0144 we wszystkich potrzebnych strefach:</p>\
<ul>\
<li><strong>\u2713 TAK</strong> \u2014 zatwierdza ca\u0142y diagram obra\u017Ce\u0144</li>\
<li><strong>\u2715 NIE</strong> \u2014 odrzuca wszystkie zmiany i wraca do stanu sprzed otwarcia</li>\
</ul>\
<p>Zaznaczone obra\u017Cenia widoczne s\u0105:</p>\
<ul>\
<li>Na karcie pacjenta jako skr\u00F3cone podsumowanie (np. \u201E\uD83E\uDE7B G\u0142owa: Z\u0142amanie, Krwawienie\u201D)</li>\
<li>W raporcie przy danym pacjencie</li>\
</ul>\
<hr>\
<h2>5. Dysponowanie</h2>\
<h3>Modalne okna konfiguracji</h3>\
<p>Przy pierwszym wej\u015Bciu w zak\u0142adk\u0119 Dysponowanie pojawiaj\u0105 si\u0119 kolejno 3 modale:</p>\
<p><strong>1. Kierownik Dzia\u0142a\u0144 Medycznych (GDM)</strong></p>\
<ul>\
<li>Pole na imi\u0119 i nazwisko GDM</li>\
<li>Przycisk importu danych od dyspozytora (patrz sekcja 6)</li>\
<li>POMI\u0143 lub ZAPISZ</li>\
</ul>\
<p><strong>2. Zespo\u0142y ZRM</strong></p>\
<ul>\
<li>Pytanie: \u201ECzy znasz zespo\u0142y ZRM zadysponowane na miejsce?\u201D</li>\
<li>TAK \u2192 formularz dodawania zespo\u0142\u00F3w (nazwa + przycisk dodaj)</li>\
<li>NIE \u2192 u\u017Cyj domy\u015Blnych zespo\u0142\u00F3w (S-01, S-02, P-01, P-02, P-03, LPR)</li>\
<li>ZATWIERD\u0179 lub POMI\u0143 (DOMY\u015ALNE)</li>\
</ul>\
<p><strong>3. Szpitale docelowe</strong></p>\
<ul>\
<li>Formularz dodawania szpitali z pojemno\u015Bci\u0105:\
<ul>\
<li>Nazwa szpitala</li>\
<li>\uD83D\uDD34 Pojemno\u015B\u0107 czerwona (T1) \u2014 liczba \u0142\u00F3\u017Cek</li>\
<li>\uD83D\uDFE1 Pojemno\u015B\u0107 \u017C\u00F3\u0142ta (T2) \u2014 liczba \u0142\u00F3\u017Cek</li>\
</ul></li>\
<li>ZATWIERD\u0179 lub POMI\u0143 (DOMY\u015ALNE)</li>\
</ul>\
<p>Ka\u017Cdy modal pojawia si\u0119 tylko raz na zdarzenie.</p>\
<h3>Formularz dysponowania</h3>\
<p>Sekcja \u201EZadysponuj transport\u201D zawiera:</p>\
<ol>\
<li><strong>Pacjent</strong> \u2014 lista rozwijana z pacjentami na miejscu, posortowana wg priorytetu</li>\
<li><strong>Zesp\u00F3\u0142 ZRM</strong> \u2014 lista dost\u0119pnych zespo\u0142\u00F3w (zaj\u0119te zespo\u0142y s\u0105 ukryte)</li>\
<li><strong>Szpital</strong> \u2014 lista szpitali z informacj\u0105 o zaj\u0119to\u015Bci:\
<ul>\
<li>Format: \u201ENazwa szpitala [\uD83D\uDD34 zaj\u0119te/wszystkie \uD83D\uDFE1 zaj\u0119te/wszystkie]\u201D</li>\
<li>Szpitale bez wolnych miejsc w kategorii pacjenta oznaczone ostrze\u017Ceniem</li>\
</ul></li>\
<li><strong>DYSPONUJ TRANSPORT</strong> \u2014 przycisk aktywny gdy wszystkie pola wype\u0142nione</li>\
</ol>\
<h3>Panele zarz\u0105dzania</h3>\
<p>Pod formularzem znajduj\u0105 si\u0119 dwa panele (na szerokich ekranach obok siebie, na w\u0105skich pod sob\u0105):</p>\
<p><strong>Szpitale</strong> (\u0142\u00F3\u017Cka WSZYSTKIE):</p>\
<ul>\
<li>Lista szpitali z edytowalnymi polami pojemno\u015Bci (\uD83D\uDD34 i \uD83D\uDFE1)</li>\
<li>Dodawanie nowych szpitali</li>\
<li>Usuwanie szpitali (\u2715)</li>\
<li>Zwijanie/rozwijanie listy</li>\
</ul>\
<p><strong>Zespo\u0142y ZRM:</strong></p>\
<ul>\
<li>Lista zespo\u0142\u00F3w z przyciskami usuwania</li>\
<li>Dodawanie nowych zespo\u0142\u00F3w</li>\
<li>Zwijanie/rozwijanie listy</li>\
</ul>\
<h3>Historia transport\u00F3w</h3>\
<p>Na dole sekcji dysponowania (domy\u015Blnie zwini\u0119ta). Rozwi\u0144 aby zobaczy\u0107 chronologiczn\u0105 list\u0119 wszystkich transport\u00F3w z:</p>\
<ul>\
<li>Znacznik pacjenta z kolorem</li>\
<li>Zesp\u00F3\u0142 \u2192 Szpital \u2192 czas wyjazdu</li>\
<li>Status (w transporcie / dostarczony)</li>\
</ul>\
<hr>\
<h2>6. Import danych od dyspozytora</h2>\
<p>Funkcja pozwala dyspozytorowi przes\u0142a\u0107 dane (nazw\u0119 zdarzenia, GDM, zespo\u0142y ZRM, szpitale z pojemno\u015Bci\u0105) do ratownika w terenie.</p>\
<h3>Metoda 1 \u2014 Link SMS (jedno klikni\u0119cie)</h3>\
<p>Dyspozytor wysy\u0142a SMS z linkiem w formacie:</p>\
<pre><code>https://0xjaqbek.github.io/triage/?i=DANE_BASE64</code></pre>\
<p>Po klikni\u0119ciu linku:</p>\
<ol>\
<li>Aplikacja otwiera si\u0119 z cache (nie wymaga internetu je\u015Bli zainstalowana)</li>\
<li>Pojawia si\u0119 podgl\u0105d danych: nazwa zdarzenia, GDM, zespo\u0142y, szpitale</li>\
<li><strong>IMPORTUJ</strong> \u2014 importuje dane i otwiera segregacj\u0119</li>\
<li><strong>ODRZU\u0106</strong> \u2014 ignoruje dane</li>\
</ol>\
<h3>Metoda 2 \u2014 Wklejenie danych</h3>\
<p>Je\u015Bli link nie otwiera aplikacji (zablokowane urz\u0105dzenia):</p>\
<ol>\
<li>Otw\u00F3rz aplikacj\u0119, przejd\u017A do Dysponowanie</li>\
<li>W modalu GDM kliknij <strong>\uD83D\uDCE5 IMPORTUJ DANE OD DYSPOZYTORA</strong></li>\
<li>Wklej tre\u015B\u0107 SMS (ca\u0142y link lub sam kod Base64)</li>\
<li>Podgl\u0105d danych pojawi si\u0119 automatycznie</li>\
<li><strong>IMPORTUJ</strong> \u2014 zatwierdza dane</li>\
</ol>\
<h3>Import w trakcie zdarzenia</h3>\
<p>Je\u015Bli zdarzenie jest ju\u017C rozpocz\u0119te i masz posegregowanych pacjent\u00F3w:</p>\
<ul>\
<li><strong>Pacjenci</strong> \u2014 zachowani (nigdy nie s\u0105 usuwani)</li>\
<li><strong>KAM</strong> \u2014 zachowany</li>\
<li><strong>GDM</strong> \u2014 zast\u0105piony danymi dyspozytora</li>\
<li><strong>Zespo\u0142y ZRM</strong> \u2014 zast\u0105pione danymi dyspozytora</li>\
<li><strong>Szpitale</strong> \u2014 zast\u0105pione danymi dyspozytora</li>\
<li><strong>Nazwa zdarzenia</strong> \u2014 po\u0142\u0105czone: \u201ETwoja nazwa | Nazwa dyspozytora (dyspozytor)\u201D</li>\
</ul>\
<p>\u017B\u00F3\u0142te ostrze\u017Cenie w podgl\u0105dzie informuje o zachowaniu pacjent\u00F3w i KAM.</p>\
<hr>\
<h2>7. Tryb dyspozytora</h2>\
<p>Dost\u0119pny przez link \u201ETryb dyspozytora \u2192\u201D na ekranie startowym lub pod adresem <code>/dyspozytor/</code>.</p>\
<p>Strona pozwala dyspozytorowi przygotowa\u0107 i wys\u0142a\u0107 dane dla zespo\u0142u w terenie.</p>\
<h3>Formularz</h3>\
<ol>\
<li><strong>Nazwa zdarzenia</strong> \u2014 np. \u201EMCI Krak\u00F3w-Nowa Huta\u201D</li>\
<li><strong>G\u0142\u00F3wny Dyspozytor Medyczny (GDM)</strong> \u2014 imi\u0119 i nazwisko</li>\
<li><strong>Zespo\u0142y ZRM</strong> \u2014 dodawaj po jednym (nazwa + przycisk \u201E+\u201D)</li>\
<li><strong>Szpitale docelowe</strong> \u2014 nazwa + pojemno\u015B\u0107 \uD83D\uDD34 i \uD83D\uDFE1 (+ przycisk dodaj)</li>\
</ol>\
<h3>Wysy\u0142anie</h3>\
<ul>\
<li><strong>\uD83D\uDCCB Podgl\u0105d danych</strong> \u2014 pokazuje podsumowanie z rozmiarem w znakach i liczb\u0105 SMS</li>\
<li><strong>\uD83D\uDCF1 Wy\u015Blij SMS</strong> \u2014 otwiera aplikacj\u0119 SMS z gotowym linkiem</li>\
<li><strong>\uD83D\uDCCB Kopiuj dane</strong> \u2014 kopiuje link do schowka</li>\
</ul>\
<p>Dane kodowane s\u0105 w Base64 (kompatybilno\u015B\u0107 z SMS GSM-7 \u2014 do 1530 znak\u00F3w w 10 segmentach SMS). Pomie\u015Bci ok. 20 szpitali i 20 zespo\u0142\u00F3w.</p>\
<hr>\
<h2>8. Raport</h2>\
<h3>Raport wizualny</h3>\
<p>Sekcja \u201ERaport dla dyspozytora\u201D generuje si\u0119 automatycznie i zawiera:</p>\
<p><strong>Nag\u0142\u00F3wek:</strong></p>\
<ul>\
<li>Nazwa zdarzenia, czas rozpocz\u0119cia, czas raportu</li>\
<li>KAM i GDM (je\u015Bli podane)</li>\
<li>Czas zako\u0144czenia (je\u015Bli zdarzenie zako\u0144czone)</li>\
</ul>\
<p><strong>Podsumowanie:</strong></p>\
<ul>\
<li>Kolorowe znaczniki z liczb\u0105 pacjent\u00F3w w ka\u017Cdej kategorii</li>\
<li>\u0141\u0105czna liczba pacjent\u00F3w</li>\
</ul>\
<p><strong>Szpitale</strong> (osobny blok dla ka\u017Cdego szpitala z transportami):</p>\
<ul>\
<li>Nazwa szpitala, liczba pacjent\u00F3w, info o pojemno\u015Bci</li>\
<li>Lista pacjent\u00F3w z: znacznik, wiek/p\u0142e\u0107, zesp\u00F3\u0142, czas, status (W TRANSPORCIE / DOSTARCZONY)</li>\
<li>Historia retria\u017Cu (np. \u21BAT1\u2192T2\u2192T1)</li>\
<li>Historia zmian szpitala (np. \u21C4Szpital1\u2192Szpital2)</li>\
<li>Podsumowanie obra\u017Ce\u0144</li>\
</ul>\
<p><strong>Pacjenci na miejscu</strong> (je\u015Bli kto\u015B pozosta\u0142):</p>\
<ul>\
<li>Lista z: znacznik, wiek/p\u0142e\u0107, kategoria, notatki, obra\u017Cenia</li>\
</ul>\
<h3>Raport tekstowy</h3>\
<p>Przycisk \u201E\uD83D\uDCCB Raport tekstowy\u201D otwiera modal z pe\u0142nym raportem w formacie tekstowym. Zawiera kompletn\u0105 list\u0119 pacjent\u00F3w z notatkami, p\u0142ci\u0105, wiekiem i \u015Bcie\u017Ck\u0105 segregacji.</p>\
<h3>Wysy\u0142anie raportu</h3>\
<ul>\
<li><strong>\uD83D\uDCCB Kopiuj do schowka</strong> \u2014 kopiuje pe\u0142ny tekst raportu</li>\
<li><strong>\uD83D\uDCE4 Wy\u015Blij</strong> \u2014 otwiera opcje:\
<ul>\
<li><strong>SMS</strong> \u2014 otwiera natywn\u0105 aplikacj\u0119 SMS z tre\u015Bci\u0105 raportu</li>\
<li><strong>Email</strong> \u2014 otwiera klienta email z tematem i tre\u015Bci\u0105 raportu</li>\
</ul></li>\
</ul>\
<h3>Zako\u0144czenie zdarzenia</h3>\
<p>Przycisk <strong>ZAKO\u0143CZ ZDARZENIE</strong> w nag\u0142\u00F3wku raportu:</p>\
<ul>\
<li>Zapisuje czas zako\u0144czenia</li>\
<li>Zmienia si\u0119 na <strong>COFNIJ ZAKO\u0143CZENIE</strong> (odwracalne)</li>\
<li>Czas zako\u0144czenia pojawia si\u0119 w raporcie</li>\
</ul>\
<hr>\
<h2>9. Retria\u017C i zmiana szpitala</h2>\
<h3>Retria\u017C</h3>\
<p>Na karcie pacjenta w sekcji \u201EPacjenci na miejscu\u201D znajduj\u0105 si\u0119 4 kolorowe kropki (T1\u2013T4). Klikni\u0119cie innej kategorii ni\u017C aktualna:</p>\
<ol>\
<li>Otwiera okno potwierdzenia: \u201EZmieni\u0107 kategori\u0119 pacjenta P-001 z T1 na T2?\u201D</li>\
<li><strong>POTWIERD\u0179</strong> \u2014 zmienia kategori\u0119, zapisuje w historii</li>\
<li><strong>ANULUJ</strong> \u2014 bez zmian</li>\
</ol>\
<p>Historia retria\u017Cu:</p>\
<ul>\
<li>Znacznik \u21BAn na karcie pacjenta (n = liczba zmian)</li>\
<li>Pe\u0142na historia w raporcie (np. T1\u2192T2\u2192T1 z godzinami)</li>\
</ul>\
<h3>Zmiana szpitala w transporcie</h3>\
<p>Na karcie pacjenta \u201EW transporcie\u201D przycisk \u201Ezmie\u0144\u201D:</p>\
<ol>\
<li>Otwiera modal z aktualnym szpitalem</li>\
<li>Lista rozwijana z dost\u0119pnymi szpitalami (z informacj\u0105 o pojemno\u015Bci)</li>\
<li><strong>POTWIERD\u0179</strong> \u2014 zmienia szpital, zapisuje w historii</li>\
<li><strong>ANULUJ</strong> \u2014 bez zmian</li>\
</ol>\
<p>Historia zmian szpitala widoczna w raporcie (\u21C4Szpital1\u2192Szpital2).</p>\
<hr>\
<h2>10. Instalacja i tryb offline</h2>\
<h3>Instalacja jako PWA</h3>\
<p><strong>Android (Chrome):</strong></p>\
<ol>\
<li>Otw\u00F3rz aplikacj\u0119 w Chrome</li>\
<li>Tapnij \u22EE (menu) w prawym g\u00F3rnym rogu</li>\
<li>Wybierz \u201EDodaj do ekranu g\u0142\u00F3wnego\u201D</li>\
<li>Tapnij \u201EZainstaluj\u201D</li>\
</ol>\
<p><strong>iOS (Safari):</strong></p>\
<ol>\
<li>Otw\u00F3rz aplikacj\u0119 w Safari</li>\
<li>Tapnij \u2399 (Udost\u0119pnij)</li>\
<li>Przewi\u0144 w d\u00F3\u0142 i wybierz \u201EDodaj do ekranu pocz\u0105tkowego\u201D</li>\
</ol>\
<p>Po instalacji aplikacja dzia\u0142a jako osobna aplikacja z pe\u0142nym trybem offline.</p>\
<h3>Tryb offline</h3>\
<p>Aplikacja po pierwszym za\u0142adowaniu zapisuje si\u0119 w cache urz\u0105dzenia. Wszystkie funkcje dzia\u0142aj\u0105 bez po\u0142\u0105czenia z internetem:</p>\
<ul>\
<li>Segregacja pacjent\u00F3w</li>\
<li>Dysponowanie transportu</li>\
<li>Generowanie raport\u00F3w</li>\
<li>Import danych (wklejanie)</li>\
</ul>\
<p>Internet potrzebny jest tylko do: pierwszego pobrania, aktualizacji, oraz wysy\u0142ki SMS/email (przez natywne aplikacje urz\u0105dzenia).</p>\
<h3>Pobranie jako plik HTML</h3>\
<p>Przycisk <strong>\u2B07 Pobierz</strong> na ekranie startowym pobiera aplikacj\u0119 jako samodzielny plik HTML. Mo\u017Cna go przenie\u015B\u0107 na pendrive i uruchomi\u0107 na dowolnym komputerze z przegl\u0105dark\u0105.</p>\
<hr>\
<h2>11. Prywatno\u015B\u0107</h2>\
<ul>\
<li>Wszystkie dane przechowywane s\u0105 <strong>wy\u0142\u0105cznie na urz\u0105dzeniu</strong> (localStorage)</li>\
<li>\u017Badne dane <strong>nie s\u0105 wysy\u0142ane</strong> na serwery zewn\u0119trzne</li>\
<li>Brak analityki, \u015Bledzenia, telemetrii</li>\
<li>Brak plik\u00F3w cookie do \u015Bledzenia</li>\
<li>Funkcje SMS i email korzystaj\u0105 z natywnych aplikacji urz\u0105dzenia \u2014 aplikacja nie wysy\u0142a wiadomo\u015Bci bezpo\u015Brednio</li>\
<li>Usuni\u0119cie danych: u\u017Cyj \u201EZako\u0144cz zdarzenie\u201D lub wyczy\u015B\u0107 dane przegl\u0105darki</li>\
</ul>\
<p>Pe\u0142na polityka prywatno\u015Bci dost\u0119pna pod adresem <code>/privacy/</code>.</p>';

CONTENT.en = '<h1>TRIAGE MCI User Manual</h1>\
<h2>1. What is TRIAGE MCI</h2>\
<p>TRIAGE MCI is a web application (PWA) for triage and mass casualty incident (MCI) management based on the START algorithm. It allows you to:</p>\
<ul>\
<li>Classify patients into 4 categories (T1\u2013T4)</li>\
<li>Manage transport to hospitals</li>\
<li>Track hospital capacity</li>\
<li>Generate and send reports</li>\
<li>Import data from a dispatcher</li>\
</ul>\
<p>The application works fully offline. All data is stored exclusively on the user\'s device \u2014 no information is sent to external servers.</p>\
<p>It supports 7 languages: Polish, English, Italian, French, German, Czech, and Portuguese.</p>\
<hr>\
<h2>2. Starting an Incident</h2>\
<h3>Start Screen</h3>\
<p>When you launch the application, the incident configuration screen appears:</p>\
<ol>\
<li><strong>Language selection</strong> \u2014 selector at the top of the screen. Changing the language immediately translates the entire interface.</li>\
<li><strong>Incident name</strong> \u2014 required field. Enter the location and type of incident (e.g., \u201CCrash A4 km 312\u201D). This will appear in reports.</li>\
<li><strong>MCI Commander</strong> \u2014 optional field. Medical Action Commander \u2014 the name of the person coordinating on-scene operations.</li>\
<li><strong>Show hints</strong> \u2014 toggle that enables contextual hint bubbles throughout the application. Useful for first-time use.</li>\
<li><strong>START TRIAGE</strong> \u2014 starts the incident and launches the timer.</li>\
</ol>\
<h3>Resuming an Incident</h3>\
<p>If a saved incident exists in device memory, the following options appear on launch:</p>\
<ul>\
<li><strong>CONTINUE</strong> \u2014 resumes the saved incident with all data</li>\
<li><strong>NEW INCIDENT</strong> \u2014 clears previous data and starts from scratch</li>\
</ul>\
<hr>\
<h2>3. Triage (START Algorithm)</h2>\
<h3>Navigation</h3>\
<p>The application has 3 tabs at the top of the screen:</p>\
<ul>\
<li><strong>TRIAGE</strong> \u2014 patient classification</li>\
<li><strong>DISPATCH</strong> \u2014 transport and management</li>\
<li><strong>REPORT</strong> \u2014 summary and export</li>\
</ul>\
<p>The statistics bar below the navigation shows the number of patients in each category: \uD83D\uDD34 T1, \uD83D\uDFE1 T2, \uD83D\uDFE2 T3, \u26AB T4, and the total.</p>\
<h3>START Triage Wizard</h3>\
<p>The wizard guides you through the 6-step START algorithm. At each step, you answer YES or NO:</p>\
<p><strong>Step 1 \u2014 Can the patient walk?</strong></p>\
<ul>\
<li>YES \u2192 T3 Green (delayed)</li>\
<li>NO \u2192 proceed to step 2</li>\
</ul>\
<p><strong>Step 2 \u2014 Is the patient breathing spontaneously?</strong></p>\
<ul>\
<li>YES \u2192 proceed to step 4 (respiratory rate assessment)</li>\
<li>NO \u2192 proceed to step 3</li>\
</ul>\
<p><strong>Step 3 \u2014 Open the airway. Is the patient breathing after airway opening?</strong></p>\
<ul>\
<li>YES \u2192 T1 Red (immediate)</li>\
<li>NO \u2192 T4 Black (deceased)</li>\
</ul>\
<p><strong>Step 4 \u2014 Is the respiratory rate normal (\u2264 30/min)?</strong></p>\
<ul>\
<li>YES \u2192 proceed to step 5</li>\
<li>NO \u2192 T1 Red (immediate)</li>\
</ul>\
<p><strong>Step 5 \u2014 Is capillary refill normal (\u2264 2 sec) and radial pulse present?</strong></p>\
<ul>\
<li>YES \u2192 proceed to step 6</li>\
<li>NO \u2192 T1 Red (immediate)</li>\
</ul>\
<p><strong>Step 6 \u2014 Can the patient follow simple commands?</strong></p>\
<ul>\
<li>YES \u2192 T2 Yellow (urgent)</li>\
<li>NO \u2192 T1 Red (immediate)</li>\
</ul>\
<p>Each question has a hint displayed below it \u2014 describing how to assess the given parameter.</p>\
<h3>Result Card</h3>\
<p>After completing triage, a result card appears with:</p>\
<ul>\
<li><strong>Color tag</strong> \u2014 a large square with the category (T1/T2/T3/T4)</li>\
<li><strong>Decision path</strong> \u2014 shows the algorithm flow</li>\
<li><strong>Sex</strong> \u2014 buttons M (male), F (female), ? (unknown)</li>\
<li><strong>Age</strong> \u2014 numeric field with buttons -5, -1, +1, +5 (range 0\u2013150)</li>\
<li><strong>Body injuries</strong> \u2014 button to open the injury diagram (see section 4)</li>\
<li><strong>Notes</strong> \u2014 field for additional information (injuries, mechanism of injury, etc.)</li>\
</ul>\
<p>Available actions:</p>\
<ul>\
<li><strong>\u2713 CONFIRM PATIENT</strong> \u2014 adds the patient to the list</li>\
<li><strong>\u21BA START OVER</strong> \u2014 resets the wizard to step 1</li>\
<li><strong>CHANGE COLOR MANUALLY</strong> \u2014 opens a row of 4 buttons (T1\u2013T4) for manual category override</li>\
</ul>\
<h3>On-Scene Patient List</h3>\
<p>Below the wizard, the \u201COn-scene patients\u201D list is displayed, sorted by priority (T1 \u2192 T2 \u2192 T3 \u2192 T4).</p>\
<p>Each patient card contains:</p>\
<ul>\
<li>Color tag (e.g., P-001)</li>\
<li>Category, sex/age, registration time</li>\
<li>Notes field (editable)</li>\
<li>Injury button (\uD83E\uDE7B) with summary</li>\
<li>4 retriage dots (T1\u2013T4) \u2014 click to change category</li>\
<li>Delete button (\u2715)</li>\
<li>Retriage badge (\u21BAn) if the category was changed</li>\
</ul>\
<h3>In-Transit List</h3>\
<p>The \u201CIn transit\u201D section appears when patients are en route to a hospital. Each card shows:</p>\
<ul>\
<li>Patient tag with category color</li>\
<li>Route: Team \u2192 Hospital \u2192 departure time</li>\
<li>\u201Cchange\u201D button \u2014 change the destination hospital</li>\
<li>\u201C\u2713 Delivered\u201D button \u2014 marks delivery and releases the EMS team</li>\
</ul>\
<hr>\
<h2>4. Body Injury Diagram</h2>\
<p>The \u201C\uD83E\uDE7B Body injuries\u201D button opens an interactive body diagram.</p>\
<h3>Diagram View</h3>\
<p>Two body outlines are displayed side by side:</p>\
<ul>\
<li><strong>FRONT</strong> \u2014 head, chest, abdomen, arms, legs</li>\
<li><strong>BACK</strong> \u2014 head, upper back, lower back, arms, legs</li>\
</ul>\
<p>Side labels are visible: <strong>L</strong> (left) and <strong>R</strong> (right), reversed for the back view.</p>\
<p>Click on a body zone to select it.</p>\
<h3>Zone Injury Panel</h3>\
<p>After selecting a zone, a panel opens with 7 injury types to mark:</p>\
<ul>\
<li>Fracture</li>\
<li>Bleeding</li>\
<li>Burn</li>\
<li>Wound</li>\
<li>Swelling</li>\
<li>Pain</li>\
<li>Amputation</li>\
</ul>\
<p>Checked types are marked with \u2713. Each can be toggled on/off by clicking.</p>\
<p>At the bottom of the panel:</p>\
<ul>\
<li><strong>\u2715 NO</strong> \u2014 discards changes for this zone</li>\
<li><strong>\u2713 YES</strong> \u2014 confirms injuries for the selected zone</li>\
</ul>\
<h3>Confirming the Diagram</h3>\
<p>After marking injuries in all needed zones:</p>\
<ul>\
<li><strong>\u2713 YES</strong> \u2014 confirms the entire injury diagram</li>\
<li><strong>\u2715 NO</strong> \u2014 discards all changes and reverts to the state before opening</li>\
</ul>\
<p>Marked injuries are visible:</p>\
<ul>\
<li>On the patient card as an abbreviated summary (e.g., \u201C\uD83E\uDE7B Head: Fracture, Bleeding\u201D)</li>\
<li>In the report for the given patient</li>\
</ul>\
<hr>\
<h2>5. Dispatch</h2>\
<h3>Configuration Modals</h3>\
<p>When you first enter the Dispatch tab, 3 modals appear in sequence:</p>\
<p><strong>1. Medical Operations Director (GDM)</strong></p>\
<ul>\
<li>Field for GDM name</li>\
<li>Button to import data from the dispatcher (see section 6)</li>\
<li>SKIP or SAVE</li>\
</ul>\
<p><strong>2. EMS Teams</strong></p>\
<ul>\
<li>Question: \u201CDo you know the EMS teams dispatched to the scene?\u201D</li>\
<li>YES \u2192 form for adding teams (name + add button)</li>\
<li>NO \u2192 use default teams (S-01, S-02, P-01, P-02, P-03, LPR)</li>\
<li>CONFIRM or SKIP (DEFAULT)</li>\
</ul>\
<p><strong>3. Destination Hospitals</strong></p>\
<ul>\
<li>Form for adding hospitals with capacity:\
<ul>\
<li>Hospital name</li>\
<li>\uD83D\uDD34 Red capacity (T1) \u2014 number of beds</li>\
<li>\uD83D\uDFE1 Yellow capacity (T2) \u2014 number of beds</li>\
</ul></li>\
<li>CONFIRM or SKIP (DEFAULT)</li>\
</ul>\
<p>Each modal appears only once per incident.</p>\
<h3>Dispatch Form</h3>\
<p>The \u201CDispatch transport\u201D section contains:</p>\
<ol>\
<li><strong>Patient</strong> \u2014 dropdown list of on-scene patients, sorted by priority</li>\
<li><strong>EMS Team</strong> \u2014 list of available teams (busy teams are hidden)</li>\
<li><strong>Hospital</strong> \u2014 list of hospitals with occupancy information:\
<ul>\
<li>Format: \u201CHospital name [\uD83D\uDD34 occupied/total \uD83D\uDFE1 occupied/total]\u201D</li>\
<li>Hospitals with no available beds for the patient\'s category are flagged with a warning</li>\
</ul></li>\
<li><strong>DISPATCH TRANSPORT</strong> \u2014 button active when all fields are filled</li>\
</ol>\
<h3>Management Panels</h3>\
<p>Below the form are two panels (side by side on wide screens, stacked on narrow screens):</p>\
<p><strong>Hospitals</strong> (ALL beds):</p>\
<ul>\
<li>List of hospitals with editable capacity fields (\uD83D\uDD34 and \uD83D\uDFE1)</li>\
<li>Adding new hospitals</li>\
<li>Removing hospitals (\u2715)</li>\
<li>Collapsing/expanding the list</li>\
</ul>\
<p><strong>EMS Teams:</strong></p>\
<ul>\
<li>List of teams with delete buttons</li>\
<li>Adding new teams</li>\
<li>Collapsing/expanding the list</li>\
</ul>\
<h3>Transport History</h3>\
<p>At the bottom of the dispatch section (collapsed by default). Expand to see a chronological list of all transports with:</p>\
<ul>\
<li>Patient tag with color</li>\
<li>Team \u2192 Hospital \u2192 departure time</li>\
<li>Status (in transit / delivered)</li>\
</ul>\
<hr>\
<h2>6. Importing Data from the Dispatcher</h2>\
<p>This feature allows the dispatcher to send data (incident name, GDM, EMS teams, hospitals with capacity) to the responder in the field.</p>\
<h3>Method 1 \u2014 SMS Link (one click)</h3>\
<p>The dispatcher sends an SMS with a link in this format:</p>\
<pre><code>https://0xjaqbek.github.io/triage/?i=BASE64_DATA</code></pre>\
<p>After clicking the link:</p>\
<ol>\
<li>The application opens from cache (no internet required if installed)</li>\
<li>A data preview appears: incident name, GDM, teams, hospitals</li>\
<li><strong>IMPORT</strong> \u2014 imports the data and opens triage</li>\
<li><strong>DISCARD</strong> \u2014 ignores the data</li>\
</ol>\
<h3>Method 2 \u2014 Pasting Data</h3>\
<p>If the link does not open the application (locked devices):</p>\
<ol>\
<li>Open the application, go to Dispatch</li>\
<li>In the GDM modal, click <strong>\uD83D\uDCE5 IMPORT DATA FROM DISPATCHER</strong></li>\
<li>Paste the SMS content (the full link or just the Base64 code)</li>\
<li>The data preview appears automatically</li>\
<li><strong>IMPORT</strong> \u2014 confirms the data</li>\
</ol>\
<h3>Import During an Active Incident</h3>\
<p>If the incident is already in progress and you have triaged patients:</p>\
<ul>\
<li><strong>Patients</strong> \u2014 preserved (never deleted)</li>\
<li><strong>MCI Commander</strong> \u2014 preserved</li>\
<li><strong>GDM</strong> \u2014 replaced with dispatcher data</li>\
<li><strong>EMS Teams</strong> \u2014 replaced with dispatcher data</li>\
<li><strong>Hospitals</strong> \u2014 replaced with dispatcher data</li>\
<li><strong>Incident name</strong> \u2014 merged: \u201CYour name | Dispatcher name (dispatcher)\u201D</li>\
</ul>\
<p>A yellow warning in the preview informs you that patients and MCI Commander are preserved.</p>\
<hr>\
<h2>7. Dispatcher Mode</h2>\
<p>Accessible via the \u201CDispatcher mode \u2192\u201D link on the start screen or at <code>/dyspozytor/</code>.</p>\
<p>This page allows the dispatcher to prepare and send data to the field team.</p>\
<h3>Form</h3>\
<ol>\
<li><strong>Incident name</strong> \u2014 e.g., \u201CMCI Krakow-Nowa Huta\u201D</li>\
<li><strong>Medical Operations Director (GDM)</strong> \u2014 full name</li>\
<li><strong>EMS Teams</strong> \u2014 add one at a time (name + \u201C+\u201D button)</li>\
<li><strong>Destination hospitals</strong> \u2014 name + \uD83D\uDD34 and \uD83D\uDFE1 capacity (+ add button)</li>\
</ol>\
<h3>Sending</h3>\
<ul>\
<li><strong>\uD83D\uDCCB Preview data</strong> \u2014 shows a summary with character count and number of SMS segments</li>\
<li><strong>\uD83D\uDCF1 Send SMS</strong> \u2014 opens the SMS app with a ready-made link</li>\
<li><strong>\uD83D\uDCCB Copy data</strong> \u2014 copies the link to the clipboard</li>\
</ul>\
<p>Data is encoded in Base64 (compatible with GSM-7 SMS \u2014 up to 1,530 characters in 10 SMS segments). This can accommodate approximately 20 hospitals and 20 teams.</p>\
<hr>\
<h2>8. Report</h2>\
<h3>Visual Report</h3>\
<p>The \u201CReport for dispatcher\u201D section is generated automatically and contains:</p>\
<p><strong>Header:</strong></p>\
<ul>\
<li>Incident name, start time, report time</li>\
<li>MCI Commander and GDM (if provided)</li>\
<li>End time (if the incident is closed)</li>\
</ul>\
<p><strong>Summary:</strong></p>\
<ul>\
<li>Color tags with patient counts for each category</li>\
<li>Total patient count</li>\
</ul>\
<p><strong>Hospitals</strong> (separate block for each hospital with transports):</p>\
<ul>\
<li>Hospital name, patient count, capacity info</li>\
<li>Patient list with: tag, age/sex, team, time, status (IN TRANSIT / DELIVERED)</li>\
<li>Retriage history (e.g., \u21BAT1\u2192T2\u2192T1)</li>\
<li>Hospital change history (e.g., \u21C4Hospital1\u2192Hospital2)</li>\
<li>Injury summary</li>\
</ul>\
<p><strong>On-scene patients</strong> (if any remain):</p>\
<ul>\
<li>List with: tag, age/sex, category, notes, injuries</li>\
</ul>\
<h3>Text Report</h3>\
<p>The \u201C\uD83D\uDCCB Text report\u201D button opens a modal with the full report in text format. It includes a complete patient list with notes, sex, age, and triage pathway.</p>\
<h3>Sending the Report</h3>\
<ul>\
<li><strong>\uD83D\uDCCB Copy to clipboard</strong> \u2014 copies the full report text</li>\
<li><strong>\uD83D\uDCE4 Send</strong> \u2014 opens options:\
<ul>\
<li><strong>SMS</strong> \u2014 opens the native SMS app with the report content</li>\
<li><strong>Email</strong> \u2014 opens the email client with the subject and report content</li>\
</ul></li>\
</ul>\
<h3>Closing the Incident</h3>\
<p>The <strong>END INCIDENT</strong> button in the report header:</p>\
<ul>\
<li>Saves the end time</li>\
<li>Changes to <strong>UNDO CLOSING</strong> (reversible)</li>\
<li>The end time appears in the report</li>\
</ul>\
<hr>\
<h2>9. Retriage and Hospital Change</h2>\
<h3>Retriage</h3>\
<p>On the patient card in the \u201COn-scene patients\u201D section, there are 4 colored dots (T1\u2013T4). Clicking a different category than the current one:</p>\
<ol>\
<li>Opens a confirmation dialog: \u201CChange patient P-001 category from T1 to T2?\u201D</li>\
<li><strong>CONFIRM</strong> \u2014 changes the category, saves to history</li>\
<li><strong>CANCEL</strong> \u2014 no changes</li>\
</ol>\
<p>Retriage history:</p>\
<ul>\
<li>Badge \u21BAn on the patient card (n = number of changes)</li>\
<li>Full history in the report (e.g., T1\u2192T2\u2192T1 with timestamps)</li>\
</ul>\
<h3>Changing Hospital During Transport</h3>\
<p>On the patient card in \u201CIn transit,\u201D the \u201Cchange\u201D button:</p>\
<ol>\
<li>Opens a modal with the current hospital</li>\
<li>Dropdown list of available hospitals (with capacity info)</li>\
<li><strong>CONFIRM</strong> \u2014 changes the hospital, saves to history</li>\
<li><strong>CANCEL</strong> \u2014 no changes</li>\
</ol>\
<p>Hospital change history is visible in the report (\u21C4Hospital1\u2192Hospital2).</p>\
<hr>\
<h2>10. Installation and Offline Mode</h2>\
<h3>Installing as a PWA</h3>\
<p><strong>Android (Chrome):</strong></p>\
<ol>\
<li>Open the application in Chrome</li>\
<li>Tap \u22EE (menu) in the upper right corner</li>\
<li>Select \u201CAdd to Home screen\u201D</li>\
<li>Tap \u201CInstall\u201D</li>\
</ol>\
<p><strong>iOS (Safari):</strong></p>\
<ol>\
<li>Open the application in Safari</li>\
<li>Tap \u2399 (Share)</li>\
<li>Scroll down and select \u201CAdd to Home Screen\u201D</li>\
</ol>\
<p>After installation, the application runs as a standalone app with full offline mode.</p>\
<h3>Offline Mode</h3>\
<p>After the first load, the application is saved in the device\'s cache. All features work without an internet connection:</p>\
<ul>\
<li>Patient triage</li>\
<li>Transport dispatch</li>\
<li>Report generation</li>\
<li>Data import (pasting)</li>\
</ul>\
<p>Internet is only needed for: the initial download, updates, and sending SMS/email (via the device\'s native apps).</p>\
<h3>Download as HTML File</h3>\
<p>The <strong>\u2B07 Download</strong> button on the start screen downloads the application as a standalone HTML file. It can be transferred to a USB drive and opened on any computer with a browser.</p>\
<hr>\
<h2>11. Privacy</h2>\
<ul>\
<li>All data is stored <strong>exclusively on the device</strong> (localStorage)</li>\
<li>No data is <strong>sent</strong> to external servers</li>\
<li>No analytics, tracking, or telemetry</li>\
<li>No tracking cookies</li>\
<li>SMS and email features use the device\'s native apps \u2014 the application does not send messages directly</li>\
<li>To delete data: use \u201CEnd incident\u201D or clear browser data</li>\
</ul>\
<p>The full privacy policy is available at <code>/privacy/</code>.</p>';

CONTENT.it = '<h1>Manuale d\'uso TRIAGE MCI</h1>\
<h2>1. Cos\'\u00E8 TRIAGE MCI</h2>\
<p>TRIAGE MCI \u00E8 un\'applicazione web (PWA) per il triage e la gestione degli incidenti con numerose vittime (MCI), basata sull\'algoritmo START. Consente di:</p>\
<ul>\
<li>Classificare i pazienti in 4 categorie (T1\u2013T4)</li>\
<li>Gestire il trasporto verso gli ospedali</li>\
<li>Monitorare la capacit\u00E0 degli ospedali</li>\
<li>Generare e inviare rapporti</li>\
<li>Importare dati dal dispatching</li>\
</ul>\
<p>L\'applicazione funziona interamente offline. Tutti i dati vengono memorizzati esclusivamente sul dispositivo dell\'utente \u2014 nessuna informazione viene inviata a server esterni.</p>\
<p>Supporta 7 lingue: polacco, inglese, italiano, francese, tedesco, ceco, portoghese.</p>\
<hr>\
<h2>2. Avvio dell\'evento</h2>\
<h3>Schermata iniziale</h3>\
<p>All\'avvio dell\'applicazione apparir\u00E0 la schermata di configurazione dell\'evento:</p>\
<ol>\
<li><strong>Selezione della lingua</strong> \u2014 selettore in alto sullo schermo. La modifica della lingua traduce immediatamente l\'intera interfaccia.</li>\
<li><strong>Nome dell\'evento</strong> \u2014 campo obbligatorio. Inserire la posizione e il tipo di evento (es. \u201CIncidente A4 km 312\u201D). Apparir\u00E0 nei rapporti.</li>\
<li><strong>KAM</strong> \u2014 campo facoltativo. Responsabile dell\'Azione Medica \u2014 nome e cognome della persona che coordina le operazioni sul posto.</li>\
<li><strong>Mostra suggerimenti</strong> \u2014 interruttore che attiva i fumetti con suggerimenti contestuali in tutta l\'applicazione. Utile al primo utilizzo.</li>\
<li><strong>INIZIA TRIAGE</strong> \u2014 avvia l\'evento e fa partire il cronometro.</li>\
</ol>\
<h3>Ripresa dell\'evento</h3>\
<p>Se nella memoria del dispositivo \u00E8 presente un evento salvato, all\'avvio apparir\u00E0 l\'opzione:</p>\
<ul>\
<li><strong>CONTINUA</strong> \u2014 riprende l\'evento salvato con tutti i dati</li>\
<li><strong>NUOVO EVENTO</strong> \u2014 cancella i dati precedenti e ricomincia da zero</li>\
</ul>\
<hr>\
<h2>3. Triage (algoritmo START)</h2>\
<h3>Navigazione</h3>\
<p>L\'applicazione ha 3 schede nella parte superiore dello schermo:</p>\
<ul>\
<li><strong>TRIAGE</strong> \u2014 classificazione dei pazienti</li>\
<li><strong>DISPATCHING</strong> \u2014 trasporto e gestione</li>\
<li><strong>RAPPORTO</strong> \u2014 riepilogo ed esportazione</li>\
</ul>\
<p>La barra delle statistiche sotto la navigazione mostra il numero di pazienti in ogni categoria: \uD83D\uDD34 T1, \uD83D\uDFE1 T2, \uD83D\uDFE2 T3, \u26AB T4 e il totale.</p>\
<h3>Procedura guidata di triage START</h3>\
<p>La procedura guidata accompagna l\'utente attraverso l\'algoritmo START in 6 passaggi. Ad ogni passaggio si risponde S\u00CC o NO:</p>\
<p><strong>Passaggio 1 \u2014 Il paziente cammina?</strong></p>\
<ul>\
<li>S\u00CC \u2192 T3 Verde (differito)</li>\
<li>NO \u2192 passare al passaggio 2</li>\
</ul>\
<p><strong>Passaggio 2 \u2014 Respira spontaneamente?</strong></p>\
<ul>\
<li>S\u00CC \u2192 passare al passaggio 4 (valutazione della frequenza respiratoria)</li>\
<li>NO \u2192 passare al passaggio 3</li>\
</ul>\
<p><strong>Passaggio 3 \u2014 Liberare le vie aeree. Respira dopo la disostruzione?</strong></p>\
<ul>\
<li>S\u00CC \u2192 T1 Rosso (immediato)</li>\
<li>NO \u2192 T4 Nero (decesso)</li>\
</ul>\
<p><strong>Passaggio 4 \u2014 La frequenza respiratoria \u00E8 nella norma (\u2264 30/min)?</strong></p>\
<ul>\
<li>S\u00CC \u2192 passare al passaggio 5</li>\
<li>NO \u2192 T1 Rosso (immediato)</li>\
</ul>\
<p><strong>Passaggio 5 \u2014 Il refill capillare \u00E8 nella norma (\u2264 2 sec.) e il polso radiale \u00E8 presente?</strong></p>\
<ul>\
<li>S\u00CC \u2192 passare al passaggio 6</li>\
<li>NO \u2192 T1 Rosso (immediato)</li>\
</ul>\
<p><strong>Passaggio 6 \u2014 Esegue ordini semplici?</strong></p>\
<ul>\
<li>S\u00CC \u2192 T2 Giallo (urgente)</li>\
<li>NO \u2192 T1 Rosso (immediato)</li>\
</ul>\
<p>Ogni domanda ha un suggerimento (hint) visibile sotto la domanda \u2014 descrive come valutare il parametro in questione.</p>\
<h3>Scheda del risultato</h3>\
<p>Al termine del triage appare la scheda del risultato con:</p>\
<ul>\
<li><strong>Indicatore colorato</strong> \u2014 grande quadrato con la categoria (T1/T2/T3/T4)</li>\
<li><strong>Percorso decisionale</strong> \u2014 mostra lo svolgimento dell\'algoritmo</li>\
<li><strong>Sesso</strong> \u2014 pulsanti M (maschio), F (femmina), ? (sconosciuto)</li>\
<li><strong>Et\u00E0</strong> \u2014 campo numerico con pulsanti -5, -1, +1, +5 (intervallo 0\u2013150)</li>\
<li><strong>Lesioni corporee</strong> \u2014 pulsante che apre il diagramma delle lesioni (vedi sezione 4)</li>\
<li><strong>Note</strong> \u2014 campo per informazioni aggiuntive (lesioni, meccanismo del trauma ecc.)</li>\
</ul>\
<p>Azioni disponibili:</p>\
<ul>\
<li><strong>\u2713 CONFERMA PAZIENTE</strong> \u2014 aggiunge il paziente alla lista</li>\
<li><strong>\u21BA DA CAPO</strong> \u2014 reimposta la procedura guidata al passaggio 1</li>\
<li><strong>CAMBIA COLORE MANUALMENTE</strong> \u2014 apre una fila di 4 pulsanti (T1\u2013T4) per la modifica manuale della categoria</li>\
</ul>\
<h3>Lista pazienti sul posto</h3>\
<p>Sotto la procedura guidata \u00E8 visualizzata la lista \u201CPazienti sul posto\u201D ordinata per priorit\u00E0 (T1 \u2192 T2 \u2192 T3 \u2192 T4).</p>\
<p>Ogni scheda paziente contiene:</p>\
<ul>\
<li>Indicatore colorato (es. P-001)</li>\
<li>Categoria, sesso/et\u00E0, ora di registrazione</li>\
<li>Campo note (modificabile)</li>\
<li>Pulsante lesioni (\uD83E\uDE7B) con riepilogo</li>\
<li>4 punti di re-triage (T1\u2013T4) \u2014 cliccare per cambiare la categoria</li>\
<li>Pulsante di eliminazione (\u2715)</li>\
<li>Indicatore di re-triage (\u21BAn) se la categoria \u00E8 stata modificata</li>\
</ul>\
<h3>Lista in trasporto</h3>\
<p>La sezione \u201CIn trasporto\u201D appare quando i pazienti sono in viaggio verso l\'ospedale. Ogni scheda mostra:</p>\
<ul>\
<li>Indicatore del paziente con il colore della categoria</li>\
<li>Percorso: Squadra \u2192 Ospedale \u2192 ora di partenza</li>\
<li>Pulsante \u201Cmodifica\u201D \u2014 modifica dell\'ospedale di destinazione</li>\
<li>Pulsante \u201C\u2713 Consegnato\u201D \u2014 segna la consegna e libera la squadra</li>\
</ul>\
<hr>\
<h2>4. Diagramma delle lesioni corporee</h2>\
<p>Il pulsante \u201C\uD83E\uDE7B Lesioni corporee\u201D apre un diagramma interattivo del corpo.</p>\
<h3>Vista del diagramma</h3>\
<p>Vengono visualizzati due contorni del corpo affiancati:</p>\
<ul>\
<li><strong>ANTERIORE</strong> (front) \u2014 testa, torace, addome, braccia, gambe</li>\
<li><strong>POSTERIORE</strong> (back) \u2014 testa, parte superiore della schiena, parte inferiore della schiena, braccia, gambe</li>\
</ul>\
<p>Ai lati sono visibili le indicazioni dei lati: <strong>S</strong> (sinistra) e <strong>D</strong> (destra), invertite per la vista posteriore.</p>\
<p>Cliccare su una zona del corpo per selezionarla.</p>\
<h3>Pannello delle lesioni della zona</h3>\
<p>Dopo aver selezionato una zona, si apre un pannello con 7 tipi di trauma da contrassegnare:</p>\
<ul>\
<li>Frattura</li>\
<li>Emorragia</li>\
<li>Ustione</li>\
<li>Ferita</li>\
<li>Gonfiore</li>\
<li>Dolore</li>\
<li>Amputazione</li>\
</ul>\
<p>I tipi contrassegnati sono indicati con \u2713. Ognuno pu\u00F2 essere attivato/disattivato con un clic.</p>\
<p>In fondo al pannello:</p>\
<ul>\
<li><strong>\u2715 NO</strong> \u2014 annulla le modifiche in questa zona</li>\
<li><strong>\u2713 S\u00CC</strong> \u2014 conferma le lesioni per la zona selezionata</li>\
</ul>\
<h3>Conferma del diagramma</h3>\
<p>Dopo aver contrassegnato le lesioni in tutte le zone necessarie:</p>\
<ul>\
<li><strong>\u2713 S\u00CC</strong> \u2014 conferma l\'intero diagramma delle lesioni</li>\
<li><strong>\u2715 NO</strong> \u2014 annulla tutte le modifiche e torna allo stato precedente all\'apertura</li>\
</ul>\
<p>Le lesioni contrassegnate sono visibili:</p>\
<ul>\
<li>Sulla scheda del paziente come riepilogo abbreviato (es. \u201C\uD83E\uDE7B Testa: Frattura, Emorragia\u201D)</li>\
<li>Nel rapporto relativo al paziente</li>\
</ul>\
<hr>\
<h2>5. Dispatching</h2>\
<h3>Finestre modali di configurazione</h3>\
<p>Al primo accesso alla scheda Dispatching appaiono in sequenza 3 finestre modali:</p>\
<p><strong>1. Direttore delle Operazioni Mediche (GDM)</strong></p>\
<ul>\
<li>Campo per nome e cognome del GDM</li>\
<li>Pulsante di importazione dati dal dispatching (vedi sezione 6)</li>\
<li>SALTA o SALVA</li>\
</ul>\
<p><strong>2. Squadre di soccorso</strong></p>\
<ul>\
<li>Domanda: \u201CConosci le squadre di soccorso inviate sul posto?\u201D</li>\
<li>S\u00CC \u2192 modulo per aggiungere le squadre (nome + pulsante aggiungi)</li>\
<li>NO \u2192 usa le squadre predefinite (S-01, S-02, P-01, P-02, P-03, LPR)</li>\
<li>CONFERMA o SALTA (PREDEFINITE)</li>\
</ul>\
<p><strong>3. Ospedali di destinazione</strong></p>\
<ul>\
<li>Modulo per aggiungere ospedali con capacit\u00E0:\
<ul>\
<li>Nome dell\'ospedale</li>\
<li>\uD83D\uDD34 Capacit\u00E0 rossa (T1) \u2014 numero di posti letto</li>\
<li>\uD83D\uDFE1 Capacit\u00E0 gialla (T2) \u2014 numero di posti letto</li>\
</ul></li>\
<li>CONFERMA o SALTA (PREDEFINITE)</li>\
</ul>\
<p>Ogni finestra modale appare solo una volta per evento.</p>\
<h3>Modulo di dispatching</h3>\
<p>La sezione \u201CDisponi il trasporto\u201D contiene:</p>\
<ol>\
<li><strong>Paziente</strong> \u2014 elenco a discesa con i pazienti sul posto, ordinato per priorit\u00E0</li>\
<li><strong>Squadra di soccorso</strong> \u2014 elenco delle squadre disponibili (le squadre occupate sono nascoste)</li>\
<li><strong>Ospedale</strong> \u2014 elenco degli ospedali con informazioni sull\'occupazione:\
<ul>\
<li>Formato: \u201CNome ospedale [\uD83D\uDD34 occupati/totali \uD83D\uDFE1 occupati/totali]\u201D</li>\
<li>Ospedali senza posti liberi nella categoria del paziente contrassegnati con avviso</li>\
</ul></li>\
<li><strong>DISPONI TRASPORTO</strong> \u2014 pulsante attivo quando tutti i campi sono compilati</li>\
</ol>\
<h3>Pannelli di gestione</h3>\
<p>Sotto il modulo si trovano due pannelli (su schermi larghi affiancati, su schermi stretti sovrapposti):</p>\
<p><strong>Ospedali</strong> (posti letto TOTALI):</p>\
<ul>\
<li>Elenco degli ospedali con campi di capacit\u00E0 modificabili (\uD83D\uDD34 e \uD83D\uDFE1)</li>\
<li>Aggiunta di nuovi ospedali</li>\
<li>Eliminazione degli ospedali (\u2715)</li>\
<li>Comprimere/espandere l\'elenco</li>\
</ul>\
<p><strong>Squadre di soccorso:</strong></p>\
<ul>\
<li>Elenco delle squadre con pulsanti di eliminazione</li>\
<li>Aggiunta di nuove squadre</li>\
<li>Comprimere/espandere l\'elenco</li>\
</ul>\
<h3>Cronologia dei trasporti</h3>\
<p>In fondo alla sezione dispatching (compressa per impostazione predefinita). Espandere per visualizzare l\'elenco cronologico di tutti i trasporti con:</p>\
<ul>\
<li>Indicatore del paziente con colore</li>\
<li>Squadra \u2192 Ospedale \u2192 ora di partenza</li>\
<li>Stato (in trasporto / consegnato)</li>\
</ul>\
<hr>\
<h2>6. Importazione dati dal dispatching</h2>\
<p>La funzione consente al dispatcher di inviare dati (nome dell\'evento, GDM, squadre di soccorso, ospedali con capacit\u00E0) al soccorritore sul campo.</p>\
<h3>Metodo 1 \u2014 Link SMS (un solo clic)</h3>\
<p>Il dispatcher invia un SMS con un link nel formato:</p>\
<pre><code>https://0xjaqbek.github.io/triage/?i=DATI_BASE64</code></pre>\
<p>Dopo aver cliccato il link:</p>\
<ol>\
<li>L\'applicazione si apre dalla cache (non richiede internet se installata)</li>\
<li>Appare un\'anteprima dei dati: nome dell\'evento, GDM, squadre, ospedali</li>\
<li><strong>IMPORTA</strong> \u2014 importa i dati e apre il triage</li>\
<li><strong>RIFIUTA</strong> \u2014 ignora i dati</li>\
</ol>\
<h3>Metodo 2 \u2014 Incollare i dati</h3>\
<p>Se il link non apre l\'applicazione (dispositivi bloccati):</p>\
<ol>\
<li>Aprire l\'applicazione, andare alla sezione Dispatching</li>\
<li>Nella finestra modale GDM cliccare <strong>\uD83D\uDCE5 IMPORTA DATI DAL DISPATCHER</strong></li>\
<li>Incollare il contenuto dell\'SMS (l\'intero link o solo il codice Base64)</li>\
<li>L\'anteprima dei dati apparir\u00E0 automaticamente</li>\
<li><strong>IMPORTA</strong> \u2014 conferma i dati</li>\
</ol>\
<h3>Importazione durante l\'evento</h3>\
<p>Se l\'evento \u00E8 gi\u00E0 in corso e ci sono pazienti gi\u00E0 triaggiati:</p>\
<ul>\
<li><strong>Pazienti</strong> \u2014 mantenuti (non vengono mai eliminati)</li>\
<li><strong>KAM</strong> \u2014 mantenuto</li>\
<li><strong>GDM</strong> \u2014 sostituito con i dati del dispatcher</li>\
<li><strong>Squadre di soccorso</strong> \u2014 sostituite con i dati del dispatcher</li>\
<li><strong>Ospedali</strong> \u2014 sostituiti con i dati del dispatcher</li>\
<li><strong>Nome dell\'evento</strong> \u2014 unito: \u201CIl tuo nome | Nome del dispatcher (dispatcher)\u201D</li>\
</ul>\
<p>Un avviso giallo nell\'anteprima informa sul mantenimento dei pazienti e del KAM.</p>\
<hr>\
<h2>7. Modalit\u00E0 dispatcher</h2>\
<p>Accessibile tramite il link \u201CModalit\u00E0 dispatcher \u2192\u201D nella schermata iniziale o all\'indirizzo <code>/dyspozytor/</code>.</p>\
<p>La pagina consente al dispatcher di preparare e inviare i dati per la squadra sul campo.</p>\
<h3>Modulo</h3>\
<ol>\
<li><strong>Nome dell\'evento</strong> \u2014 es. \u201CMCI Krak\u00F3w-Nowa Huta\u201D</li>\
<li><strong>Direttore delle Operazioni Mediche (GDM)</strong> \u2014 nome e cognome</li>\
<li><strong>Squadre di soccorso</strong> \u2014 aggiungere una alla volta (nome + pulsante \u201C+\u201D)</li>\
<li><strong>Ospedali di destinazione</strong> \u2014 nome + capacit\u00E0 \uD83D\uDD34 e \uD83D\uDFE1 (+ pulsante aggiungi)</li>\
</ol>\
<h3>Invio</h3>\
<ul>\
<li><strong>\uD83D\uDCCB Anteprima dati</strong> \u2014 mostra il riepilogo con la dimensione in caratteri e il numero di SMS</li>\
<li><strong>\uD83D\uDCF1 Invia SMS</strong> \u2014 apre l\'applicazione SMS con il link pronto</li>\
<li><strong>\uD83D\uDCCB Copia dati</strong> \u2014 copia il link negli appunti</li>\
</ul>\
<p>I dati sono codificati in Base64 (compatibilit\u00E0 con SMS GSM-7 \u2014 fino a 1530 caratteri in 10 segmenti SMS). Pu\u00F2 contenere circa 20 ospedali e 20 squadre.</p>\
<hr>\
<h2>8. Rapporto</h2>\
<h3>Rapporto visuale</h3>\
<p>La sezione \u201CRapporto per il dispatcher\u201D si genera automaticamente e contiene:</p>\
<p><strong>Intestazione:</strong></p>\
<ul>\
<li>Nome dell\'evento, ora di inizio, ora del rapporto</li>\
<li>KAM e GDM (se indicati)</li>\
<li>Ora di chiusura (se l\'evento \u00E8 concluso)</li>\
</ul>\
<p><strong>Riepilogo:</strong></p>\
<ul>\
<li>Indicatori colorati con il numero di pazienti in ogni categoria</li>\
<li>Numero totale di pazienti</li>\
</ul>\
<p><strong>Ospedali</strong> (blocco separato per ogni ospedale con i trasporti):</p>\
<ul>\
<li>Nome dell\'ospedale, numero di pazienti, informazioni sulla capacit\u00E0</li>\
<li>Elenco dei pazienti con: indicatore, et\u00E0/sesso, squadra, ora, stato (IN TRASPORTO / CONSEGNATO)</li>\
<li>Cronologia del re-triage (es. \u21BAT1\u2192T2\u2192T1)</li>\
<li>Cronologia dei cambi di ospedale (es. \u21C4Ospedale1\u2192Ospedale2)</li>\
<li>Riepilogo delle lesioni</li>\
</ul>\
<p><strong>Pazienti sul posto</strong> (se qualcuno \u00E8 rimasto):</p>\
<ul>\
<li>Elenco con: indicatore, et\u00E0/sesso, categoria, note, lesioni</li>\
</ul>\
<h3>Rapporto testuale</h3>\
<p>Il pulsante \u201C\uD83D\uDCCB Rapporto testuale\u201D apre una finestra modale con il rapporto completo in formato testo. Contiene l\'elenco completo dei pazienti con note, sesso, et\u00E0 e percorso di triage.</p>\
<h3>Invio del rapporto</h3>\
<ul>\
<li><strong>\uD83D\uDCCB Copia negli appunti</strong> \u2014 copia il testo completo del rapporto</li>\
<li><strong>\uD83D\uDCE4 Invia</strong> \u2014 apre le opzioni:\
<ul>\
<li><strong>SMS</strong> \u2014 apre l\'applicazione SMS nativa con il contenuto del rapporto</li>\
<li><strong>Email</strong> \u2014 apre il client email con oggetto e contenuto del rapporto</li>\
</ul></li>\
</ul>\
<h3>Chiusura dell\'evento</h3>\
<p>Il pulsante <strong>CHIUDI EVENTO</strong> nell\'intestazione del rapporto:</p>\
<ul>\
<li>Salva l\'ora di chiusura</li>\
<li>Si trasforma in <strong>ANNULLA CHIUSURA</strong> (reversibile)</li>\
<li>L\'ora di chiusura appare nel rapporto</li>\
</ul>\
<hr>\
<h2>9. Re-triage e cambio di ospedale</h2>\
<h3>Re-triage</h3>\
<p>Sulla scheda del paziente nella sezione \u201CPazienti sul posto\u201D ci sono 4 punti colorati (T1\u2013T4). Cliccando una categoria diversa da quella attuale:</p>\
<ol>\
<li>Si apre una finestra di conferma: \u201CCambiare la categoria del paziente P-001 da T1 a T2?\u201D</li>\
<li><strong>CONFERMA</strong> \u2014 cambia la categoria e la salva nella cronologia</li>\
<li><strong>ANNULLA</strong> \u2014 nessuna modifica</li>\
</ol>\
<p>Cronologia del re-triage:</p>\
<ul>\
<li>Indicatore \u21BAn sulla scheda del paziente (n = numero di modifiche)</li>\
<li>Cronologia completa nel rapporto (es. T1\u2192T2\u2192T1 con orari)</li>\
</ul>\
<h3>Cambio di ospedale durante il trasporto</h3>\
<p>Sulla scheda del paziente \u201CIn trasporto\u201D il pulsante \u201Cmodifica\u201D:</p>\
<ol>\
<li>Apre una finestra modale con l\'ospedale attuale</li>\
<li>Elenco a discesa con gli ospedali disponibili (con informazioni sulla capacit\u00E0)</li>\
<li><strong>CONFERMA</strong> \u2014 cambia l\'ospedale e lo salva nella cronologia</li>\
<li><strong>ANNULLA</strong> \u2014 nessuna modifica</li>\
</ol>\
<p>La cronologia dei cambi di ospedale \u00E8 visibile nel rapporto (\u21C4Ospedale1\u2192Ospedale2).</p>\
<hr>\
<h2>10. Installazione e modalit\u00E0 offline</h2>\
<h3>Installazione come PWA</h3>\
<p><strong>Android (Chrome):</strong></p>\
<ol>\
<li>Aprire l\'applicazione in Chrome</li>\
<li>Toccare \u22EE (menu) nell\'angolo in alto a destra</li>\
<li>Selezionare \u201CAggiungi alla schermata Home\u201D</li>\
<li>Toccare \u201CInstalla\u201D</li>\
</ol>\
<p><strong>iOS (Safari):</strong></p>\
<ol>\
<li>Aprire l\'applicazione in Safari</li>\
<li>Toccare \u2399 (Condividi)</li>\
<li>Scorrere verso il basso e selezionare \u201CAggiungi alla schermata Home\u201D</li>\
</ol>\
<p>Dopo l\'installazione l\'applicazione funziona come un\'applicazione indipendente con piena modalit\u00E0 offline.</p>\
<h3>Modalit\u00E0 offline</h3>\
<p>L\'applicazione, dopo il primo caricamento, viene salvata nella cache del dispositivo. Tutte le funzioni operano senza connessione a internet:</p>\
<ul>\
<li>Triage dei pazienti</li>\
<li>Dispatching dei trasporti</li>\
<li>Generazione dei rapporti</li>\
<li>Importazione dati (incollare)</li>\
</ul>\
<p>La connessione a internet \u00E8 necessaria solo per: il primo download, gli aggiornamenti e l\'invio di SMS/email (tramite le applicazioni native del dispositivo).</p>\
<h3>Download come file HTML</h3>\
<p>Il pulsante <strong>\u2B07 Scarica</strong> nella schermata iniziale scarica l\'applicazione come file HTML autonomo. Pu\u00F2 essere trasferito su una chiavetta USB e avviato su qualsiasi computer dotato di browser.</p>\
<hr>\
<h2>11. Privacy</h2>\
<ul>\
<li>Tutti i dati sono memorizzati <strong>esclusivamente sul dispositivo</strong> (localStorage)</li>\
<li>Nessun dato viene <strong>inviato</strong> a server esterni</li>\
<li>Nessuna analitica, tracciamento o telemetria</li>\
<li>Nessun cookie di tracciamento</li>\
<li>Le funzioni SMS ed email utilizzano le applicazioni native del dispositivo \u2014 l\'applicazione non invia messaggi direttamente</li>\
<li>Eliminazione dei dati: utilizzare \u201CChiudi evento\u201D o cancellare i dati del browser</li>\
</ul>\
<p>L\'informativa completa sulla privacy \u00E8 disponibile all\'indirizzo <code>/privacy/</code>.</p>';

CONTENT.fr = '<h1>Manuel d\'utilisation TRIAGE MCI</h1>\
<h2>1. Qu\'est-ce que TRIAGE MCI</h2>\
<p>TRIAGE MCI est une application web (PWA) de tri et de gestion des incidents \u00E0 victimes multiples (MCI) bas\u00E9e sur l\'algorithme START. Elle permet :</p>\
<ul>\
<li>La classification des patients en 4 cat\u00E9gories (T1\u2013T4)</li>\
<li>La gestion du transport vers les h\u00F4pitaux</li>\
<li>Le suivi de la capacit\u00E9 hospitali\u00E8re</li>\
<li>La g\u00E9n\u00E9ration et l\'envoi de rapports</li>\
<li>L\'importation de donn\u00E9es depuis le r\u00E9gulateur</li>\
</ul>\
<p>L\'application fonctionne enti\u00E8rement hors ligne. Toutes les donn\u00E9es sont stock\u00E9es uniquement sur l\'appareil de l\'utilisateur \u2014 aucune information n\'est envoy\u00E9e \u00E0 des serveurs externes.</p>\
<p>Elle prend en charge 7 langues : polonais, anglais, italien, fran\u00E7ais, allemand, tch\u00E8que, portugais.</p>\
<hr>\
<h2>2. D\u00E9marrage d\'un \u00E9v\u00E9nement</h2>\
<h3>\u00C9cran d\'accueil</h3>\
<p>Au lancement de l\'application, l\'\u00E9cran de configuration de l\'\u00E9v\u00E9nement s\'affiche :</p>\
<ol>\
<li><strong>Choix de la langue</strong> \u2014 s\u00E9lecteur en haut de l\'\u00E9cran. Le changement de langue traduit instantan\u00E9ment toute l\'interface.</li>\
<li><strong>Nom de l\'\u00E9v\u00E9nement</strong> \u2014 champ obligatoire. Saisissez la localisation et le type d\'\u00E9v\u00E9nement (p. ex. \u00AB Accident A4 km 312 \u00BB). Il appara\u00EEtra dans les rapports.</li>\
<li><strong>KAM</strong> \u2014 champ facultatif. Directeur des Op\u00E9rations M\u00E9dicales \u2014 nom et pr\u00E9nom de la personne coordonnant les actions sur le terrain.</li>\
<li><strong>Afficher les info-bulles</strong> \u2014 interrupteur activant les bulles d\'aide contextuelle dans toute l\'application. Utile lors de la premi\u00E8re utilisation.</li>\
<li><strong>COMMENCER LE TRIAGE</strong> \u2014 lance l\'\u00E9v\u00E9nement et d\u00E9marre le chronom\u00E8tre.</li>\
</ol>\
<h3>Reprise d\'un \u00E9v\u00E9nement</h3>\
<p>Si un \u00E9v\u00E9nement sauvegard\u00E9 existe dans la m\u00E9moire de l\'appareil, une option appara\u00EEt au d\u00E9marrage :</p>\
<ul>\
<li><strong>CONTINUER</strong> \u2014 reprend l\'\u00E9v\u00E9nement sauvegard\u00E9 avec toutes les donn\u00E9es</li>\
<li><strong>NOUVEL \u00C9V\u00C9NEMENT</strong> \u2014 efface les donn\u00E9es pr\u00E9c\u00E9dentes et recommence \u00E0 z\u00E9ro</li>\
</ul>\
<hr>\
<h2>3. Tri (algorithme START)</h2>\
<h3>Navigation</h3>\
<p>L\'application dispose de 3 onglets en haut de l\'\u00E9cran :</p>\
<ul>\
<li><strong>TRI</strong> \u2014 classification des patients</li>\
<li><strong>R\u00C9GULATION</strong> \u2014 transport et gestion</li>\
<li><strong>RAPPORT</strong> \u2014 r\u00E9sum\u00E9 et export</li>\
</ul>\
<p>La barre de statistiques sous la navigation affiche le nombre de patients dans chaque cat\u00E9gorie : \uD83D\uDD34 T1, \uD83D\uDFE1 T2, \uD83D\uDFE2 T3, \u26AB T4 ainsi que le total.</p>\
<h3>Assistant de tri START</h3>\
<p>L\'assistant guide \u00E0 travers l\'algorithme START en 6 \u00E9tapes. \u00C0 chaque \u00E9tape, vous r\u00E9pondez OUI ou NON :</p>\
<p><strong>\u00C9tape 1 \u2014 Le patient marche-t-il ?</strong></p>\
<ul>\
<li>OUI \u2192 T3 Vert (diff\u00E9r\u00E9)</li>\
<li>NON \u2192 passer \u00E0 l\'\u00E9tape 2</li>\
</ul>\
<p><strong>\u00C9tape 2 \u2014 Respire-t-il spontan\u00E9ment ?</strong></p>\
<ul>\
<li>OUI \u2192 passer \u00E0 l\'\u00E9tape 4 (\u00E9valuation de la fr\u00E9quence respiratoire)</li>\
<li>NON \u2192 passer \u00E0 l\'\u00E9tape 3</li>\
</ul>\
<p><strong>\u00C9tape 3 \u2014 Lib\u00E9rez les voies a\u00E9riennes. Respire-t-il apr\u00E8s la lib\u00E9ration ?</strong></p>\
<ul>\
<li>OUI \u2192 T1 Rouge (imm\u00E9diat)</li>\
<li>NON \u2192 T4 Noir (d\u00E9c\u00E9d\u00E9)</li>\
</ul>\
<p><strong>\u00C9tape 4 \u2014 La fr\u00E9quence respiratoire est-elle normale (\u2264 30/min) ?</strong></p>\
<ul>\
<li>OUI \u2192 passer \u00E0 l\'\u00E9tape 5</li>\
<li>NON \u2192 T1 Rouge (imm\u00E9diat)</li>\
</ul>\
<p><strong>\u00C9tape 5 \u2014 Le temps de recoloration capillaire est-il normal (\u2264 2 s) et le pouls radial est-il pr\u00E9sent ?</strong></p>\
<ul>\
<li>OUI \u2192 passer \u00E0 l\'\u00E9tape 6</li>\
<li>NON \u2192 T1 Rouge (imm\u00E9diat)</li>\
</ul>\
<p><strong>\u00C9tape 6 \u2014 Ob\u00E9it-il \u00E0 des ordres simples ?</strong></p>\
<ul>\
<li>OUI \u2192 T2 Jaune (urgent)</li>\
<li>NON \u2192 T1 Rouge (imm\u00E9diat)</li>\
</ul>\
<p>Chaque question est accompagn\u00E9e d\'une info-bulle visible sous la question \u2014 elle d\u00E9crit comment \u00E9valuer le param\u00E8tre concern\u00E9.</p>\
<h3>Fiche de r\u00E9sultat</h3>\
<p>\u00C0 la fin du tri, une fiche de r\u00E9sultat s\'affiche avec :</p>\
<ul>\
<li><strong>Marqueur de couleur</strong> \u2014 grand carr\u00E9 avec la cat\u00E9gorie (T1/T2/T3/T4)</li>\
<li><strong>Chemin d\u00E9cisionnel</strong> \u2014 montre le d\u00E9roulement de l\'algorithme</li>\
<li><strong>Sexe</strong> \u2014 boutons H (homme), F (femme), ? (inconnu)</li>\
<li><strong>\u00C2ge</strong> \u2014 champ num\u00E9rique avec boutons -5, -1, +1, +5 (plage 0\u2013150)</li>\
<li><strong>L\u00E9sions corporelles</strong> \u2014 bouton ouvrant le diagramme des l\u00E9sions (voir section 4)</li>\
<li><strong>Notes</strong> \u2014 champ pour des informations suppl\u00E9mentaires (l\u00E9sions, m\u00E9canisme du traumatisme, etc.)</li>\
</ul>\
<p>Actions disponibles :</p>\
<ul>\
<li><strong>\u2713 VALIDER LE PATIENT</strong> \u2014 ajoute le patient \u00E0 la liste</li>\
<li><strong>\u21BA RECOMMENCER</strong> \u2014 r\u00E9initialise l\'assistant \u00E0 l\'\u00E9tape 1</li>\
<li><strong>CHANGER LA COULEUR MANUELLEMENT</strong> \u2014 ouvre une rang\u00E9e de 4 boutons (T1\u2013T4) pour modifier la cat\u00E9gorie manuellement</li>\
</ul>\
<h3>Liste des patients sur place</h3>\
<p>Sous l\'assistant s\'affiche la liste \u00AB Patients sur place \u00BB tri\u00E9e par priorit\u00E9 (T1 \u2192 T2 \u2192 T3 \u2192 T4).</p>\
<p>Chaque fiche patient contient :</p>\
<ul>\
<li>Marqueur de couleur (p. ex. P-001)</li>\
<li>Cat\u00E9gorie, sexe/\u00E2ge, heure d\'enregistrement</li>\
<li>Champ de notes (modifiable)</li>\
<li>Bouton de l\u00E9sions (\uD83E\uDE7B) avec r\u00E9sum\u00E9</li>\
<li>4 points de re-triage (T1\u2013T4) \u2014 cliquez pour changer de cat\u00E9gorie</li>\
<li>Bouton de suppression (\u2715)</li>\
<li>Marqueur de re-triage (\u21BAn) si la cat\u00E9gorie a \u00E9t\u00E9 modifi\u00E9e</li>\
</ul>\
<h3>Liste en transport</h3>\
<p>La section \u00AB En transport \u00BB appara\u00EEt lorsque des patients sont en route vers l\'h\u00F4pital. Chaque fiche affiche :</p>\
<ul>\
<li>Marqueur du patient avec la couleur de cat\u00E9gorie</li>\
<li>Itin\u00E9raire : \u00C9quipe \u2192 H\u00F4pital \u2192 heure de d\u00E9part</li>\
<li>Bouton \u00AB modifier \u00BB \u2014 changement de l\'h\u00F4pital de destination</li>\
<li>Bouton \u00AB \u2713 Livr\u00E9 \u00BB \u2014 marque la livraison et lib\u00E8re l\'\u00E9quipe</li>\
</ul>\
<hr>\
<h2>4. Diagramme des l\u00E9sions corporelles</h2>\
<p>Le bouton \u00AB \uD83E\uDE7B L\u00E9sions corporelles \u00BB ouvre un diagramme corporel interactif.</p>\
<h3>Vue du diagramme</h3>\
<p>Deux silhouettes sont affich\u00E9es c\u00F4te \u00E0 c\u00F4te :</p>\
<ul>\
<li><strong>AVANT</strong> (face) \u2014 t\u00EAte, thorax, abdomen, bras, jambes</li>\
<li><strong>ARRI\u00C8RE</strong> (dos) \u2014 t\u00EAte, haut du dos, bas du dos, bras, jambes</li>\
</ul>\
<p>Sur les c\u00F4t\u00E9s, les indications lat\u00E9rales sont visibles : <strong>G</strong> (gauche) et <strong>D</strong> (droite), invers\u00E9es pour la vue arri\u00E8re.</p>\
<p>Cliquez sur une zone du corps pour la s\u00E9lectionner.</p>\
<h3>Panneau de l\u00E9sions de la zone</h3>\
<p>Apr\u00E8s la s\u00E9lection d\'une zone, un panneau s\'ouvre avec 7 types de l\u00E9sions \u00E0 cocher :</p>\
<ul>\
<li>Fracture</li>\
<li>H\u00E9morragie</li>\
<li>Br\u00FBlure</li>\
<li>Plaie</li>\
<li>\u0152d\u00E8me</li>\
<li>Douleur</li>\
<li>Amputation</li>\
</ul>\
<p>Les types coch\u00E9s sont marqu\u00E9s par \u2713. Chacun peut \u00EAtre activ\u00E9/d\u00E9sactiv\u00E9 par un clic.</p>\
<p>En bas du panneau :</p>\
<ul>\
<li><strong>\u2715 NON</strong> \u2014 rejette les modifications pour cette zone</li>\
<li><strong>\u2713 OUI</strong> \u2014 valide les l\u00E9sions pour la zone s\u00E9lectionn\u00E9e</li>\
</ul>\
<h3>Validation du diagramme</h3>\
<p>Apr\u00E8s avoir coch\u00E9 les l\u00E9sions dans toutes les zones n\u00E9cessaires :</p>\
<ul>\
<li><strong>\u2713 OUI</strong> \u2014 valide l\'ensemble du diagramme des l\u00E9sions</li>\
<li><strong>\u2715 NON</strong> \u2014 rejette toutes les modifications et revient \u00E0 l\'\u00E9tat pr\u00E9c\u00E9dant l\'ouverture</li>\
</ul>\
<p>Les l\u00E9sions coch\u00E9es sont visibles :</p>\
<ul>\
<li>Sur la fiche patient sous forme de r\u00E9sum\u00E9 abr\u00E9g\u00E9 (p. ex. \u00AB \uD83E\uDE7B T\u00EAte : Fracture, H\u00E9morragie \u00BB)</li>\
<li>Dans le rapport pour le patient concern\u00E9</li>\
</ul>\
<hr>\
<h2>5. R\u00E9gulation</h2>\
<h3>Fen\u00EAtres modales de configuration</h3>\
<p>Lors du premier acc\u00E8s \u00E0 l\'onglet R\u00E9gulation, 3 fen\u00EAtres modales apparaissent successivement :</p>\
<p><strong>1. Directeur des Secours M\u00E9dicaux (GDM)</strong></p>\
<ul>\
<li>Champ pour le nom et pr\u00E9nom du GDM</li>\
<li>Bouton d\'importation des donn\u00E9es du r\u00E9gulateur (voir section 6)</li>\
<li>PASSER ou ENREGISTRER</li>\
</ul>\
<p><strong>2. \u00C9quipes de secours</strong></p>\
<ul>\
<li>Question : \u00AB Connaissez-vous les \u00E9quipes de secours envoy\u00E9es sur place ? \u00BB</li>\
<li>OUI \u2192 formulaire d\'ajout d\'\u00E9quipes (nom + bouton ajouter)</li>\
<li>NON \u2192 utiliser les \u00E9quipes par d\u00E9faut (S-01, S-02, P-01, P-02, P-03, LPR)</li>\
<li>VALIDER ou PASSER (PAR D\u00C9FAUT)</li>\
</ul>\
<p><strong>3. H\u00F4pitaux de destination</strong></p>\
<ul>\
<li>Formulaire d\'ajout d\'h\u00F4pitaux avec capacit\u00E9 :\
<ul>\
<li>Nom de l\'h\u00F4pital</li>\
<li>\uD83D\uDD34 Capacit\u00E9 rouge (T1) \u2014 nombre de lits</li>\
<li>\uD83D\uDFE1 Capacit\u00E9 jaune (T2) \u2014 nombre de lits</li>\
</ul></li>\
<li>VALIDER ou PASSER (PAR D\u00C9FAUT)</li>\
</ul>\
<p>Chaque fen\u00EAtre modale n\'appara\u00EEt qu\'une seule fois par \u00E9v\u00E9nement.</p>\
<h3>Formulaire de r\u00E9gulation</h3>\
<p>La section \u00AB Affecter un transport \u00BB contient :</p>\
<ol>\
<li><strong>Patient</strong> \u2014 liste d\u00E9roulante des patients sur place, tri\u00E9e par priorit\u00E9</li>\
<li><strong>\u00C9quipe de secours</strong> \u2014 liste des \u00E9quipes disponibles (les \u00E9quipes occup\u00E9es sont masqu\u00E9es)</li>\
<li><strong>H\u00F4pital</strong> \u2014 liste des h\u00F4pitaux avec informations d\'occupation :\
<ul>\
<li>Format : \u00AB Nom de l\'h\u00F4pital [\uD83D\uDD34 occup\u00E9s/total \uD83D\uDFE1 occup\u00E9s/total] \u00BB</li>\
<li>Les h\u00F4pitaux sans places disponibles dans la cat\u00E9gorie du patient sont signal\u00E9s par un avertissement</li>\
</ul></li>\
<li><strong>AFFECTER LE TRANSPORT</strong> \u2014 bouton actif lorsque tous les champs sont remplis</li>\
</ol>\
<h3>Panneaux de gestion</h3>\
<p>Sous le formulaire se trouvent deux panneaux (c\u00F4te \u00E0 c\u00F4te sur \u00E9crans larges, empil\u00E9s sur \u00E9crans \u00E9troits) :</p>\
<p><strong>H\u00F4pitaux</strong> (lits TOUS) :</p>\
<ul>\
<li>Liste des h\u00F4pitaux avec champs de capacit\u00E9 modifiables (\uD83D\uDD34 et \uD83D\uDFE1)</li>\
<li>Ajout de nouveaux h\u00F4pitaux</li>\
<li>Suppression d\'h\u00F4pitaux (\u2715)</li>\
<li>R\u00E9duction/expansion de la liste</li>\
</ul>\
<p><strong>\u00C9quipes de secours :</strong></p>\
<ul>\
<li>Liste des \u00E9quipes avec boutons de suppression</li>\
<li>Ajout de nouvelles \u00E9quipes</li>\
<li>R\u00E9duction/expansion de la liste</li>\
</ul>\
<h3>Historique des transports</h3>\
<p>En bas de la section de r\u00E9gulation (r\u00E9duit par d\u00E9faut). D\u00E9veloppez pour voir la liste chronologique de tous les transports avec :</p>\
<ul>\
<li>Marqueur du patient avec couleur</li>\
<li>\u00C9quipe \u2192 H\u00F4pital \u2192 heure de d\u00E9part</li>\
<li>Statut (en transport / livr\u00E9)</li>\
</ul>\
<hr>\
<h2>6. Importation des donn\u00E9es du r\u00E9gulateur</h2>\
<p>Cette fonction permet au r\u00E9gulateur d\'envoyer des donn\u00E9es (nom de l\'\u00E9v\u00E9nement, GDM, \u00E9quipes de secours, h\u00F4pitaux avec capacit\u00E9) \u00E0 l\'\u00E9quipe sur le terrain.</p>\
<h3>M\u00E9thode 1 \u2014 Lien SMS (un seul clic)</h3>\
<p>Le r\u00E9gulateur envoie un SMS avec un lien au format :</p>\
<pre><code>https://0xjaqbek.github.io/triage/?i=DONN\u00C9ES_BASE64</code></pre>\
<p>Apr\u00E8s avoir cliqu\u00E9 sur le lien :</p>\
<ol>\
<li>L\'application s\'ouvre depuis le cache (ne n\u00E9cessite pas d\'internet si elle est install\u00E9e)</li>\
<li>Un aper\u00E7u des donn\u00E9es s\'affiche : nom de l\'\u00E9v\u00E9nement, GDM, \u00E9quipes, h\u00F4pitaux</li>\
<li><strong>IMPORTER</strong> \u2014 importe les donn\u00E9es et ouvre le tri</li>\
<li><strong>REJETER</strong> \u2014 ignore les donn\u00E9es</li>\
</ol>\
<h3>M\u00E9thode 2 \u2014 Collage des donn\u00E9es</h3>\
<p>Si le lien n\'ouvre pas l\'application (appareils verrouill\u00E9s) :</p>\
<ol>\
<li>Ouvrez l\'application, acc\u00E9dez \u00E0 R\u00E9gulation</li>\
<li>Dans la fen\u00EAtre modale GDM, cliquez sur <strong>\uD83D\uDCE5 IMPORTER LES DONN\u00C9ES DU R\u00C9GULATEUR</strong></li>\
<li>Collez le contenu du SMS (lien complet ou code Base64 seul)</li>\
<li>L\'aper\u00E7u des donn\u00E9es s\'affiche automatiquement</li>\
<li><strong>IMPORTER</strong> \u2014 valide les donn\u00E9es</li>\
</ol>\
<h3>Importation en cours d\'\u00E9v\u00E9nement</h3>\
<p>Si l\'\u00E9v\u00E9nement est d\u00E9j\u00E0 en cours et que vous avez des patients tri\u00E9s :</p>\
<ul>\
<li><strong>Patients</strong> \u2014 conserv\u00E9s (jamais supprim\u00E9s)</li>\
<li><strong>KAM</strong> \u2014 conserv\u00E9</li>\
<li><strong>GDM</strong> \u2014 remplac\u00E9 par les donn\u00E9es du r\u00E9gulateur</li>\
<li><strong>\u00C9quipes de secours</strong> \u2014 remplac\u00E9es par les donn\u00E9es du r\u00E9gulateur</li>\
<li><strong>H\u00F4pitaux</strong> \u2014 remplac\u00E9s par les donn\u00E9es du r\u00E9gulateur</li>\
<li><strong>Nom de l\'\u00E9v\u00E9nement</strong> \u2014 fusionn\u00E9 : \u00AB Votre nom | Nom du r\u00E9gulateur (r\u00E9gulateur) \u00BB</li>\
</ul>\
<p>Un avertissement jaune dans l\'aper\u00E7u informe de la conservation des patients et du KAM.</p>\
<hr>\
<h2>7. Mode r\u00E9gulateur</h2>\
<p>Accessible via le lien \u00AB Mode r\u00E9gulateur \u2192 \u00BB sur l\'\u00E9cran d\'accueil ou \u00E0 l\'adresse <code>/dyspozytor/</code>.</p>\
<p>Cette page permet au r\u00E9gulateur de pr\u00E9parer et d\'envoyer des donn\u00E9es \u00E0 l\'\u00E9quipe sur le terrain.</p>\
<h3>Formulaire</h3>\
<ol>\
<li><strong>Nom de l\'\u00E9v\u00E9nement</strong> \u2014 p. ex. \u00AB MCI Krak\u00F3w-Nowa Huta \u00BB</li>\
<li><strong>Directeur des Secours M\u00E9dicaux (GDM)</strong> \u2014 nom et pr\u00E9nom</li>\
<li><strong>\u00C9quipes de secours</strong> \u2014 ajoutez-les une par une (nom + bouton \u00AB + \u00BB)</li>\
<li><strong>H\u00F4pitaux de destination</strong> \u2014 nom + capacit\u00E9 \uD83D\uDD34 et \uD83D\uDFE1 (+ bouton ajouter)</li>\
</ol>\
<h3>Envoi</h3>\
<ul>\
<li><strong>\uD83D\uDCCB Aper\u00E7u des donn\u00E9es</strong> \u2014 affiche le r\u00E9sum\u00E9 avec la taille en caract\u00E8res et le nombre de SMS</li>\
<li><strong>\uD83D\uDCF1 Envoyer par SMS</strong> \u2014 ouvre l\'application SMS avec le lien pr\u00EAt \u00E0 l\'emploi</li>\
<li><strong>\uD83D\uDCCB Copier les donn\u00E9es</strong> \u2014 copie le lien dans le presse-papiers</li>\
</ul>\
<p>Les donn\u00E9es sont encod\u00E9es en Base64 (compatibilit\u00E9 SMS GSM-7 \u2014 jusqu\'\u00E0 1530 caract\u00E8res en 10 segments SMS). Cela permet d\'inclure environ 20 h\u00F4pitaux et 20 \u00E9quipes.</p>\
<hr>\
<h2>8. Rapport</h2>\
<h3>Rapport visuel</h3>\
<p>La section \u00AB Rapport pour le r\u00E9gulateur \u00BB se g\u00E9n\u00E8re automatiquement et contient :</p>\
<p><strong>En-t\u00EAte :</strong></p>\
<ul>\
<li>Nom de l\'\u00E9v\u00E9nement, heure de d\u00E9but, heure du rapport</li>\
<li>KAM et GDM (si renseign\u00E9s)</li>\
<li>Heure de fin (si l\'\u00E9v\u00E9nement est termin\u00E9)</li>\
</ul>\
<p><strong>R\u00E9sum\u00E9 :</strong></p>\
<ul>\
<li>Marqueurs de couleur avec le nombre de patients dans chaque cat\u00E9gorie</li>\
<li>Nombre total de patients</li>\
</ul>\
<p><strong>H\u00F4pitaux</strong> (un bloc distinct par h\u00F4pital avec les transports) :</p>\
<ul>\
<li>Nom de l\'h\u00F4pital, nombre de patients, informations de capacit\u00E9</li>\
<li>Liste des patients avec : marqueur, \u00E2ge/sexe, \u00E9quipe, heure, statut (EN TRANSPORT / LIVR\u00C9)</li>\
<li>Historique de re-triage (p. ex. \u21BAT1\u2192T2\u2192T1)</li>\
<li>Historique des changements d\'h\u00F4pital (p. ex. \u21C4H\u00F4pital1\u2192H\u00F4pital2)</li>\
<li>R\u00E9sum\u00E9 des l\u00E9sions</li>\
</ul>\
<p><strong>Patients sur place</strong> (s\'il en reste) :</p>\
<ul>\
<li>Liste avec : marqueur, \u00E2ge/sexe, cat\u00E9gorie, notes, l\u00E9sions</li>\
</ul>\
<h3>Rapport textuel</h3>\
<p>Le bouton \u00AB \uD83D\uDCCB Rapport textuel \u00BB ouvre une fen\u00EAtre modale avec le rapport complet au format texte. Il contient la liste compl\u00E8te des patients avec notes, sexe, \u00E2ge et chemin de tri.</p>\
<h3>Envoi du rapport</h3>\
<ul>\
<li><strong>\uD83D\uDCCB Copier dans le presse-papiers</strong> \u2014 copie le texte complet du rapport</li>\
<li><strong>\uD83D\uDCE4 Envoyer</strong> \u2014 ouvre les options :\
<ul>\
<li><strong>SMS</strong> \u2014 ouvre l\'application SMS native avec le contenu du rapport</li>\
<li><strong>Email</strong> \u2014 ouvre le client de messagerie avec l\'objet et le contenu du rapport</li>\
</ul></li>\
</ul>\
<h3>Cl\u00F4ture de l\'\u00E9v\u00E9nement</h3>\
<p>Le bouton <strong>CL\u00D4TURER L\'\u00C9V\u00C9NEMENT</strong> dans l\'en-t\u00EAte du rapport :</p>\
<ul>\
<li>Enregistre l\'heure de fin</li>\
<li>Se transforme en <strong>ANNULER LA CL\u00D4TURE</strong> (r\u00E9versible)</li>\
<li>L\'heure de fin appara\u00EEt dans le rapport</li>\
</ul>\
<hr>\
<h2>9. Re-triage et changement d\'h\u00F4pital</h2>\
<h3>Re-triage</h3>\
<p>Sur la fiche patient dans la section \u00AB Patients sur place \u00BB se trouvent 4 points de couleur (T1\u2013T4). Un clic sur une cat\u00E9gorie diff\u00E9rente de la cat\u00E9gorie actuelle :</p>\
<ol>\
<li>Ouvre une fen\u00EAtre de confirmation : \u00AB Changer la cat\u00E9gorie du patient P-001 de T1 \u00E0 T2 ? \u00BB</li>\
<li><strong>CONFIRMER</strong> \u2014 change la cat\u00E9gorie, enregistre dans l\'historique</li>\
<li><strong>ANNULER</strong> \u2014 aucune modification</li>\
</ol>\
<p>Historique de re-triage :</p>\
<ul>\
<li>Marqueur \u21BAn sur la fiche patient (n = nombre de modifications)</li>\
<li>Historique complet dans le rapport (p. ex. T1\u2192T2\u2192T1 avec les heures)</li>\
</ul>\
<h3>Changement d\'h\u00F4pital en cours de transport</h3>\
<p>Sur la fiche patient \u00AB En transport \u00BB, bouton \u00AB modifier \u00BB :</p>\
<ol>\
<li>Ouvre une fen\u00EAtre modale avec l\'h\u00F4pital actuel</li>\
<li>Liste d\u00E9roulante des h\u00F4pitaux disponibles (avec informations de capacit\u00E9)</li>\
<li><strong>CONFIRMER</strong> \u2014 change l\'h\u00F4pital, enregistre dans l\'historique</li>\
<li><strong>ANNULER</strong> \u2014 aucune modification</li>\
</ol>\
<p>L\'historique des changements d\'h\u00F4pital est visible dans le rapport (\u21C4H\u00F4pital1\u2192H\u00F4pital2).</p>\
<hr>\
<h2>10. Installation et mode hors ligne</h2>\
<h3>Installation en tant que PWA</h3>\
<p><strong>Android (Chrome) :</strong></p>\
<ol>\
<li>Ouvrez l\'application dans Chrome</li>\
<li>Appuyez sur \u22EE (menu) en haut \u00E0 droite</li>\
<li>S\u00E9lectionnez \u00AB Ajouter \u00E0 l\'\u00E9cran d\'accueil \u00BB</li>\
<li>Appuyez sur \u00AB Installer \u00BB</li>\
</ol>\
<p><strong>iOS (Safari) :</strong></p>\
<ol>\
<li>Ouvrez l\'application dans Safari</li>\
<li>Appuyez sur \u2399 (Partager)</li>\
<li>Faites d\u00E9filer vers le bas et s\u00E9lectionnez \u00AB Sur l\'\u00E9cran d\'accueil \u00BB</li>\
</ol>\
<p>Apr\u00E8s l\'installation, l\'application fonctionne comme une application autonome avec un mode hors ligne complet.</p>\
<h3>Mode hors ligne</h3>\
<p>L\'application, apr\u00E8s son premier chargement, se sauvegarde dans le cache de l\'appareil. Toutes les fonctions sont disponibles sans connexion internet :</p>\
<ul>\
<li>Tri des patients</li>\
<li>R\u00E9gulation du transport</li>\
<li>G\u00E9n\u00E9ration des rapports</li>\
<li>Importation des donn\u00E9es (collage)</li>\
</ul>\
<p>L\'internet n\'est n\u00E9cessaire que pour : le premier t\u00E9l\u00E9chargement, les mises \u00E0 jour, et l\'envoi de SMS/email (via les applications natives de l\'appareil).</p>\
<h3>T\u00E9l\u00E9chargement en fichier HTML</h3>\
<p>Le bouton <strong>\u2B07 T\u00E9l\u00E9charger</strong> sur l\'\u00E9cran d\'accueil t\u00E9l\u00E9charge l\'application sous forme de fichier HTML autonome. Il peut \u00EAtre transf\u00E9r\u00E9 sur une cl\u00E9 USB et ex\u00E9cut\u00E9 sur n\'importe quel ordinateur disposant d\'un navigateur.</p>\
<hr>\
<h2>11. Confidentialit\u00E9</h2>\
<ul>\
<li>Toutes les donn\u00E9es sont stock\u00E9es <strong>uniquement sur l\'appareil</strong> (localStorage)</li>\
<li>Aucune donn\u00E9e <strong>n\'est envoy\u00E9e</strong> \u00E0 des serveurs externes</li>\
<li>Pas d\'analytique, de suivi, ni de t\u00E9l\u00E9m\u00E9trie</li>\
<li>Pas de cookies de pistage</li>\
<li>Les fonctions SMS et email utilisent les applications natives de l\'appareil \u2014 l\'application n\'envoie pas de messages directement</li>\
<li>Suppression des donn\u00E9es : utilisez \u00AB Cl\u00F4turer l\'\u00E9v\u00E9nement \u00BB ou effacez les donn\u00E9es du navigateur</li>\
</ul>\
