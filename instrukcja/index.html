<p>La politique de confidentialit\u00E9 compl\u00E8te est disponible \u00E0 l\'adresse <code>/privacy/</code>.</p>';

CONTENT.de = '<h1>Bedienungsanleitung TRIAGE MCI</h1>\
<h2>1. Was ist TRIAGE MCI</h2>\
<p>TRIAGE MCI ist eine Webanwendung (PWA) zur Sichtung und zum Management von Massenanf\u00E4llen von Verletzten (MCI), basierend auf dem START-Algorithmus. Sie erm\u00F6glicht:</p>\
<ul>\
<li>Klassifizierung von Patienten in 4 Kategorien (T1\u2013T4)</li>\
<li>Transportmanagement zu Krankenh\u00E4usern</li>\
<li>\u00DCberwachung der Krankenhauskapazit\u00E4ten</li>\
<li>Erstellung und Versand von Berichten</li>\
<li>Import von Daten des Disponenten</li>\
</ul>\
<p>Die Anwendung funktioniert vollst\u00E4ndig offline. Alle Daten werden ausschlie\u00DFlich auf dem Ger\u00E4t des Benutzers gespeichert \u2014 es werden keine Informationen an externe Server gesendet.</p>\
<p>Sie unterst\u00FCtzt 7 Sprachen: Polnisch, Englisch, Italienisch, Franz\u00F6sisch, Deutsch, Tschechisch, Portugiesisch.</p>\
<hr>\
<h2>2. Ereignis starten</h2>\
<h3>Startbildschirm</h3>\
<p>Nach dem Start der Anwendung erscheint der Ereigniskonfigurationsbildschirm:</p>\
<ol>\
<li><strong>Sprachauswahl</strong> \u2014 Selektor oben auf dem Bildschirm. Ein Sprachwechsel \u00FCbersetzt die gesamte Oberfl\u00E4che sofort.</li>\
<li><strong>Ereignisname</strong> \u2014 Pflichtfeld. Geben Sie den Ort und die Art des Ereignisses ein (z. B. \u201EUnfall A4 km 312\u201C). Erscheint in den Berichten.</li>\
<li><strong>EAL</strong> \u2014 optionales Feld. Einsatzabschnittsleiter \u2014 Name der Person, die die Ma\u00DFnahmen vor Ort koordiniert.</li>\
<li><strong>Hinweise anzeigen</strong> \u2014 Schalter zur Aktivierung von kontextuellen Hinweisblasen in der gesamten Anwendung. N\u00FCtzlich bei der ersten Verwendung.</li>\
<li><strong>TRIAGE STARTEN</strong> \u2014 startet das Ereignis und aktiviert den Timer.</li>\
</ol>\
<h3>Ereignis fortsetzen</h3>\
<p>Falls ein gespeichertes Ereignis im Ger\u00E4tespeicher vorhanden ist, erscheint beim Start die Option:</p>\
<ul>\
<li><strong>FORTSETZEN</strong> \u2014 setzt das gespeicherte Ereignis mit allen Daten fort</li>\
<li><strong>NEUES EREIGNIS</strong> \u2014 l\u00F6scht die vorherigen Daten und beginnt von vorne</li>\
</ul>\
<hr>\
<h2>3. Sichtung (START-Algorithmus)</h2>\
<h3>Navigation</h3>\
<p>Die Anwendung verf\u00FCgt \u00FCber 3 Registerkarten im oberen Bereich des Bildschirms:</p>\
<ul>\
<li><strong>SICHTUNG</strong> \u2014 Patientenklassifizierung</li>\
<li><strong>DISPONIERUNG</strong> \u2014 Transport und Management</li>\
<li><strong>BERICHT</strong> \u2014 Zusammenfassung und Export</li>\
</ul>\
<p>Die Statistikleiste unter der Navigation zeigt die Anzahl der Patienten in jeder Kategorie: \uD83D\uDD34 T1, \uD83D\uDFE1 T2, \uD83D\uDFE2 T3, \u26AB T4 sowie die Gesamtsumme.</p>\
<h3>START-Sichtungsassistent</h3>\
<p>Der Assistent f\u00FChrt durch den 6-stufigen START-Algorithmus. Bei jedem Schritt antworten Sie JA oder NEIN:</p>\
<p><strong>Schritt 1 \u2014 Kann der Patient gehen?</strong></p>\
<ul>\
<li>JA \u2192 T3 Gr\u00FCn (aufgeschoben)</li>\
<li>NEIN \u2192 weiter zu Schritt 2</li>\
</ul>\
<p><strong>Schritt 2 \u2014 Atmet der Patient spontan?</strong></p>\
<ul>\
<li>JA \u2192 weiter zu Schritt 4 (Beurteilung der Atemfrequenz)</li>\
<li>NEIN \u2192 weiter zu Schritt 3</li>\
</ul>\
<p><strong>Schritt 3 \u2014 Atemwege freimachen. Atmet der Patient nach dem Freimachen?</strong></p>\
<ul>\
<li>JA \u2192 T1 Rot (sofort)</li>\
<li>NEIN \u2192 T4 Schwarz (Tod)</li>\
</ul>\
<p><strong>Schritt 4 \u2014 Ist die Atemfrequenz normal (\u2264 30/min)?</strong></p>\
<ul>\
<li>JA \u2192 weiter zu Schritt 5</li>\
<li>NEIN \u2192 T1 Rot (sofort)</li>\
</ul>\
<p><strong>Schritt 5 \u2014 Ist der Kapillar-Refill normal (\u2264 2 Sek.) und der Radialispuls vorhanden?</strong></p>\
<ul>\
<li>JA \u2192 weiter zu Schritt 6</li>\
<li>NEIN \u2192 T1 Rot (sofort)</li>\
</ul>\
<p><strong>Schritt 6 \u2014 Befolgt der Patient einfache Anweisungen?</strong></p>\
<ul>\
<li>JA \u2192 T2 Gelb (dringend)</li>\
<li>NEIN \u2192 T1 Rot (sofort)</li>\
</ul>\
<p>Jede Frage enth\u00E4lt einen Hinweis unterhalb der Frage \u2014 er beschreibt, wie der jeweilige Parameter zu beurteilen ist.</p>\
<h3>Ergebniskarte</h3>\
<p>Nach Abschluss der Sichtung erscheint die Ergebniskarte mit:</p>\
<ul>\
<li><strong>Farbmarkierung</strong> \u2014 gro\u00DFes Quadrat mit Kategorie (T1/T2/T3/T4)</li>\
<li><strong>Entscheidungspfad</strong> \u2014 zeigt den Ablauf des Algorithmus</li>\
<li><strong>Geschlecht</strong> \u2014 Schaltfl\u00E4chen M (m\u00E4nnlich), W (weiblich), ? (unbekannt)</li>\
<li><strong>Alter</strong> \u2014 numerisches Feld mit Schaltfl\u00E4chen -5, -1, +1, +5 (Bereich 0\u2013150)</li>\
<li><strong>K\u00F6rperverletzungen</strong> \u2014 Schaltfl\u00E4che zum \u00D6ffnen des Verletzungsdiagramms (siehe Abschnitt 4)</li>\
<li><strong>Notizen</strong> \u2014 Feld f\u00FCr zus\u00E4tzliche Informationen (Verletzungen, Unfallmechanismus usw.)</li>\
</ul>\
<p>Verf\u00FCgbare Aktionen:</p>\
<ul>\
<li><strong>\u2713 PATIENT BEST\u00C4TIGEN</strong> \u2014 f\u00FCgt den Patienten zur Liste hinzu</li>\
<li><strong>\u21BA NEU STARTEN</strong> \u2014 setzt den Assistenten auf Schritt 1 zur\u00FCck</li>\
<li><strong>FARBE MANUELL \u00C4NDERN</strong> \u2014 \u00F6ffnet eine Reihe von 4 Schaltfl\u00E4chen (T1\u2013T4) zur manuellen Kategorie\u00E4nderung</li>\
</ul>\
<h3>Patientenliste vor Ort</h3>\
<p>Unterhalb des Assistenten wird die Liste \u201EPatienten vor Ort\u201C angezeigt, sortiert nach Priorit\u00E4t (T1 \u2192 T2 \u2192 T3 \u2192 T4).</p>\
<p>Jede Patientenkarte enth\u00E4lt:</p>\
<ul>\
<li>Farbmarkierung (z. B. P-001)</li>\
<li>Kategorie, Geschlecht/Alter, Registrierungszeit</li>\
<li>Notizenfeld (bearbeitbar)</li>\
<li>Verletzungsschaltfl\u00E4che (\uD83E\uDE7B) mit Zusammenfassung</li>\
<li>4 Resichtungspunkte (T1\u2013T4) \u2014 klicken Sie, um die Kategorie zu \u00E4ndern</li>\
<li>L\u00F6schschaltfl\u00E4che (\u2715)</li>\
<li>Resichtungsmarkierung (\u21BAn), falls die Kategorie ge\u00E4ndert wurde</li>\
</ul>\
<h3>Transportliste</h3>\
<p>Der Bereich \u201EIm Transport\u201C erscheint, wenn Patienten auf dem Weg zum Krankenhaus sind. Jede Karte zeigt:</p>\
<ul>\
<li>Patientenmarkierung mit Kategoriefarbe</li>\
<li>Route: Team \u2192 Krankenhaus \u2192 Abfahrtszeit</li>\
<li>Schaltfl\u00E4che \u201E\u00E4ndern\u201C \u2014 \u00C4nderung des Zielkrankenhauses</li>\
<li>Schaltfl\u00E4che \u201E\u2713 Zugestellt\u201C \u2014 markiert die Zustellung und gibt das Rettungsteam frei</li>\
</ul>\
<hr>\
<h2>4. K\u00F6rperverletzungsdiagramm</h2>\
<p>Die Schaltfl\u00E4che \u201E\uD83E\uDE7B K\u00F6rperverletzungen\u201C \u00F6ffnet ein interaktives K\u00F6rperdiagramm.</p>\
<h3>Diagrammansicht</h3>\
<p>Es werden zwei K\u00F6rperumrisse nebeneinander angezeigt:</p>\
<ul>\
<li><strong>VORNE</strong> (Front) \u2014 Kopf, Brustkorb, Bauch, Arme, Beine</li>\
<li><strong>HINTEN</strong> (R\u00FCcken) \u2014 Kopf, oberer R\u00FCcken, unterer R\u00FCcken, Arme, Beine</li>\
</ul>\
<p>An den Seiten sind die Seitenbezeichnungen sichtbar: <strong>L</strong> (links) und <strong>R</strong> (rechts), beim R\u00FCckansicht gespiegelt.</p>\
<p>Klicken Sie auf eine K\u00F6rperzone, um sie auszuw\u00E4hlen.</p>\
<h3>Zonenverletzungspanel</h3>\
<p>Nach Auswahl einer Zone \u00F6ffnet sich ein Panel mit 7 Verletzungstypen zur Markierung:</p>\
<ul>\
<li>Fraktur</li>\
<li>Blutung</li>\
<li>Verbrennung</li>\
<li>Wunde</li>\
<li>Schwellung</li>\
<li>Schmerz</li>\
<li>Amputation</li>\
</ul>\
<p>Markierte Typen sind mit \u2713 gekennzeichnet. Jeder kann per Klick ein-/ausgeschaltet werden.</p>\
<p>Am unteren Rand des Panels:</p>\
<ul>\
<li><strong>\u2715 NEIN</strong> \u2014 verwirft die \u00C4nderungen in dieser Zone</li>\
<li><strong>\u2713 JA</strong> \u2014 best\u00E4tigt die Verletzungen f\u00FCr die ausgew\u00E4hlte Zone</li>\
</ul>\
<h3>Diagramm best\u00E4tigen</h3>\
<p>Nach Markierung der Verletzungen in allen erforderlichen Zonen:</p>\
<ul>\
<li><strong>\u2713 JA</strong> \u2014 best\u00E4tigt das gesamte Verletzungsdiagramm</li>\
<li><strong>\u2715 NEIN</strong> \u2014 verwirft alle \u00C4nderungen und kehrt zum Zustand vor dem \u00D6ffnen zur\u00FCck</li>\
</ul>\
<p>Markierte Verletzungen sind sichtbar:</p>\
<ul>\
<li>Auf der Patientenkarte als Kurzzusammenfassung (z. B. \u201E\uD83E\uDE7B Kopf: Fraktur, Blutung\u201C)</li>\
<li>Im Bericht beim jeweiligen Patienten</li>\
</ul>\
<hr>\
<h2>5. Disponierung</h2>\
<h3>Modale Konfigurationsfenster</h3>\
<p>Beim ersten Aufrufen der Registerkarte Disponierung erscheinen nacheinander 3 Dialoge:</p>\
<p><strong>1. Leitender Notarzt (LNA)</strong></p>\
<ul>\
<li>Feld f\u00FCr Name des LNA</li>\
<li>Schaltfl\u00E4che zum Datenimport vom Disponenten (siehe Abschnitt 6)</li>\
<li>\u00DCBERSPRINGEN oder SPEICHERN</li>\
</ul>\
<p><strong>2. Rettungsteams</strong></p>\
<ul>\
<li>Frage: \u201EKennen Sie die zum Einsatzort disponierten Rettungsteams?\u201C</li>\

<p><strong>3. Zielkrankenh\u00E4user</strong></p>\

<p>Jeder Dialog erscheint nur einmal pro Ereignis.</p>\

<ul>\
<li>Format: \u201EKrankenhausname [\uD83D\uDD34 belegt/gesamt \uD83D\uDFE1 belegt/gesamt]\u201C</li>\
<li>Krankenh\u00E4user ohne freie Pl\u00E4tze in der Patientenkategorie sind mit Warnung gekennzeichnet</li>\
</ul></li>\

</ol>\
<h3>Verwaltungspanels</h3>\

<p>Am unteren Rand des Disponierungsbereichs (standardm\u00E4\u00DFig eingeklappt). Ausklappen zeigt eine chronologische Liste aller Transporte mit:</p>\

<hr>\
<h2>6. Datenimport vom Disponenten</h2>\
<p>Diese Funktion erm\u00F6glicht dem Disponenten, Daten (Ereignisname, LNA, Rettungsteams, Krankenh\u00E4user mit Kapazit\u00E4t) an den Rettungsdienst vor Ort zu senden.</p>\
<h3>Methode 1 \u2014 SMS-Link (Ein-Klick)</h3>\
<p>Der Disponent sendet eine SMS mit einem Link im Format:</p>\
<pre><code>https://0xjaqbek.github.io/triage/?i=DATEN_BASE64</code></pre>\
<p>Nach Anklicken des Links:</p>\
<ol>\
<li>Die Anwendung \u00F6ffnet sich aus dem Cache (kein Internet erforderlich, wenn installiert)</li>\
<li>Eine Datenvorschau erscheint: Ereignisname, LNA, Teams, Krankenh\u00E4user</li>\
<li><strong>IMPORTIEREN</strong> \u2014 importiert die Daten und \u00F6ffnet die Sichtung</li>\
<li><strong>ABLEHNEN</strong> \u2014 ignoriert die Daten</li>\
</ol>\
<h3>Methode 2 \u2014 Daten einf\u00FCgen</h3>\
<p>Falls der Link die Anwendung nicht \u00F6ffnet (gesperrte Ger\u00E4te):</p>\
<ol>\
<li>\u00D6ffnen Sie die Anwendung, navigieren Sie zu Disponierung</li>\
<li>Klicken Sie im LNA-Dialog auf <strong>\uD83D\uDCE5 DATEN VOM DISPONENTEN IMPORTIEREN</strong></li>\
<li>F\u00FCgen Sie den SMS-Inhalt ein (ganzer Link oder nur der Base64-Code)</li>\
<li>Die Datenvorschau erscheint automatisch</li>\
<li><strong>IMPORTIEREN</strong> \u2014 best\u00E4tigt die Daten</li>\
</ol>\
<h3>Import w\u00E4hrend eines Ereignisses</h3>\

<li><strong>EAL</strong> \u2014 bleibt erhalten</li>\
<li><strong>LNA</strong> \u2014 wird durch die Disponenten-Daten ersetzt</li>\
<li><strong>Rettungsteams</strong> \u2014 werden durch die Disponenten-Daten ersetzt</li>\
<li><strong>Krankenh\u00E4user</strong> \u2014 werden durch die Disponenten-Daten ersetzt</li>\
<li><strong>Ereignisname</strong> \u2014 zusammengef\u00FChrt: \u201EIhr Name | Disponenten-Name (Disponent)\u201C</li>\
</ul>\
<p>Eine gelbe Warnung in der Vorschau informiert \u00FCber die Beibehaltung der Patienten und des EAL.</p>\
<hr>\
<h2>7. Disponentenmodus</h2>\
<p>Erreichbar \u00FCber den Link \u201EDisponentenmodus \u2192\u201C auf dem Startbildschirm oder unter der Adresse <code>/dyspozytor/</code>.</p>\
<p>Die Seite erm\u00F6glicht dem Disponenten, Daten f\u00FCr das Team vor Ort vorzubereiten und zu senden.</p>\
<h3>Formular</h3>\
<ol>\
<li><strong>Ereignisname</strong> \u2014 z. B. \u201EMCI Krak\u00F3w-Nowa Huta\u201C</li>\
<li><strong>Leitender Notarzt (LNA)</strong> \u2014 Name</li>\
<li><strong>Rettungsteams</strong> \u2014 einzeln hinzuf\u00FCgen (Name + Schaltfl\u00E4che \u201E+\u201C)</li>\
<li><strong>Zielkrankenh\u00E4user</strong> \u2014 Name + Kapazit\u00E4t \uD83D\uDD34 und \uD83D\uDFE1 (+ Hinzuf\u00FCgen-Schaltfl\u00E4che)</li>\
</ol>\
<h3>Versand</h3>\
<ul>\
<li><strong>\uD83D\uDCCB Datenvorschau</strong> \u2014 zeigt eine Zusammenfassung mit Zeichenanzahl und SMS-Anzahl</li>\
<li><strong>\uD83D\uDCF1 SMS senden</strong> \u2014 \u00F6ffnet die SMS-Anwendung mit fertigem Link</li>\
<li><strong>\uD83D\uDCCB Daten kopieren</strong> \u2014 kopiert den Link in die Zwischenablage</li>\
</ul>\
<p>Die Daten werden in Base64 kodiert (kompatibel mit SMS GSM-7 \u2014 bis zu 1530 Zeichen in 10 SMS-Segmenten). Es k\u00F6nnen ca. 20 Krankenh\u00E4user und 20 Teams \u00FCbermittelt werden.</p>\
<hr>\
<h2>8. Bericht</h2>\
<h3>Visueller Bericht</h3>\
<p>Der Bereich \u201EBericht f\u00FCr den Disponenten\u201C wird automatisch generiert und enth\u00E4lt:</p>\
<p><strong>Kopfzeile:</strong></p>\
<ul>\
<li>Ereignisname, Startzeit, Berichtszeit</li>\
<li>EAL und LNA (falls angegeben)</li>\
<li>Endzeit (falls das Ereignis beendet wurde)</li>\
</ul>\
<p><strong>Zusammenfassung:</strong></p>\
<ul>\
<li>Farbmarkierungen mit Patientenanzahl in jeder Kategorie</li>\
<li>Gesamtzahl der Patienten</li>\
</ul>\
<p><strong>Krankenh\u00E4user</strong> (separater Block f\u00FCr jedes Krankenhaus mit Transporten):</p>\
<ul>\
<li>Krankenhausname, Patientenanzahl, Kapazit\u00E4tsinformation</li>\
<li>Patientenliste mit: Markierung, Alter/Geschlecht, Team, Zeit, Status (IM TRANSPORT / ZUGESTELLT)</li>\
<li>Resichtungshistorie (z. B. \u21BAT1\u2192T2\u2192T1)</li>\
<li>Krankenhaus-\u00C4nderungshistorie (z. B. \u21C4Krankenhaus1\u2192Krankenhaus2)</li>\
<li>Verletzungszusammenfassung</li>\
</ul>\
<p><strong>Patienten vor Ort</strong> (falls noch jemand verblieben ist):</p>\
<ul>\
<li>Liste mit: Markierung, Alter/Geschlecht, Kategorie, Notizen, Verletzungen</li>\

<h3>Textbericht</h3>\
<p>Die Schaltfl\u00E4che \u201E\uD83D\uDCCB Textbericht\u201C \u00F6ffnet ein Dialogfeld mit dem vollst\u00E4ndigen Bericht im Textformat. Er enth\u00E4lt die vollst\u00E4ndige Patientenliste mit Notizen, Geschlecht, Alter und Sichtungspfad.</p>\
<h3>Bericht versenden</h3>\
<ul>\
<li><strong>\uD83D\uDCCB In Zwischenablage kopieren</strong> \u2014 kopiert den vollst\u00E4ndigen Berichtstext</li>\
<li><strong>\uD83D\uDCE4 Senden</strong> \u2014 \u00F6ffnet Optionen:\
<ul>\
<li><strong>SMS</strong> \u2014 \u00F6ffnet die native SMS-Anwendung mit dem Berichtsinhalt</li>\
<li><strong>E-Mail</strong> \u2014 \u00F6ffnet den E-Mail-Client mit Betreff und Berichtsinhalt</li>\
</ul></li>\
</ul>\
<h3>Ereignis beenden</h3>\
<p>Die Schaltfl\u00E4che <strong>EREIGNIS BEENDEN</strong> in der Berichtskopfzeile:</p>\
<ul>\

<li>\u00C4ndert sich zu <strong>BEENDIGUNG R\u00DCCKG\u00C4NGIG MACHEN</strong> (umkehrbar)</li>\
<li>Die Endzeit erscheint im Bericht</li>\
</ul>\
<hr>\
<h2>9. Resichtung und Krankenhauswechsel</h2>\
<h3>Resichtung</h3>\
<p>Auf der Patientenkarte im Bereich \u201EPatienten vor Ort\u201C befinden sich 4 farbige Punkte (T1\u2013T4). Das Anklicken einer anderen als der aktuellen Kategorie:</p>\

<li>\u00D6ffnet ein Best\u00E4tigungsfenster: \u201EKategorie des Patienten P-001 von T1 auf T2 \u00E4ndern?\u201C</li>\
<li><strong>BEST\u00C4TIGEN</strong> \u2014 \u00E4ndert die Kategorie, speichert in der Historie</li>\
<li><strong>ABBRECHEN</strong> \u2014 keine \u00C4nderung</li>\
</ol>\
<p>Resichtungshistorie:</p>\
<ul>\
<li>Markierung \u21BAn auf der Patientenkarte (n = Anzahl der \u00C4nderungen)</li>\
<li>Vollst\u00E4ndige Historie im Bericht (z. B. T1\u2192T2\u2192T1 mit Uhrzeiten)</li>\
</ul>\
<h3>Krankenhauswechsel w\u00E4hrend des Transports</h3>\
<p>Auf der Patientenkarte \u201EIm Transport\u201C die Schaltfl\u00E4che \u201E\u00E4ndern\u201C:</p>\
<ol>\

<li>Dropdown-Liste mit verf\u00FCgbaren Krankenh\u00E4usern (mit Kapazit\u00E4tsinformation)</li>\
<li><strong>BEST\u00C4TIGEN</strong> \u2014 \u00E4ndert das Krankenhaus, speichert in der Historie</li>\
<li><strong>ABBRECHEN</strong> \u2014 keine \u00C4nderung</li>\
</ol>\
<p>Die Krankenhaus-\u00C4nderungshistorie ist im Bericht sichtbar (\u21C4Krankenhaus1\u2192Krankenhaus2).</p>\
<hr>\
<h2>10. Installation und Offline-Modus</h2>\

<p><strong>Android (Chrome):</strong></p>\

<li>W\u00E4hlen Sie \u201EZum Startbildschirm hinzuf\u00FCgen\u201C</li>\

<p><strong>iOS (Safari):</strong></p>\
<ol>\

</ol>\
<p>Nach der Installation funktioniert die Anwendung als eigenst\u00E4ndige App mit vollem Offline-Modus.</p>\
<h3>Offline-Modus</h3>\
<p>Die Anwendung speichert sich nach dem ersten Laden im Ger\u00E4tecache. Alle Funktionen funktionieren ohne Internetverbindung:</p>\
<ul>\

<p>Internet wird nur ben\u00F6tigt f\u00FCr: erstes Herunterladen, Aktualisierung sowie SMS-/E-Mail-Versand (\u00FCber native Ger\u00E4te-Anwendungen).</p>\
<h3>Download als HTML-Datei</h3>\
<p>Die Schaltfl\u00E4che <strong>\u2B07 Herunterladen</strong> auf dem Startbildschirm l\u00E4dt die Anwendung als eigenst\u00E4ndige HTML-Datei herunter. Diese kann auf einen USB-Stick \u00FCbertragen und auf jedem Computer mit Browser ge\u00F6ffnet werden.</p>\
<hr>\
<h2>11. Datenschutz</h2>\
<ul>\
<li>Alle Daten werden <strong>ausschlie\u00DFlich auf dem Ger\u00E4t</strong> gespeichert (localStorage)</li>\
<li>Es werden <strong>keine Daten</strong> an externe Server gesendet</li>\
<li>Keine Analytik, kein Tracking, keine Telemetrie</li>\

</ul>\
<p>Die vollst\u00E4ndige Datenschutzerkl\u00E4rung ist unter <code>/privacy/</code> verf\u00FCgbar.</p>';

<ul>\
<li><strong>Barevn\u00FD \u0161t\u00EDtek</strong> \u2014 velk\u00FD \u010Dtverec s kategori\u00ED (T1/T2/T3/T4)</li>\
<li><strong>Rozhodovac\u00ED cesta</strong> \u2014 zobrazuje pr\u016Fb\u011Bh algoritmu</li>\
<li><strong>Pohlav\u00ED</strong> \u2014 tla\u010D\u00EDtka M (mu\u017E), \u017D (\u017Eena), ? (nezn\u00E1m\u00E9)</li>\
<li><strong>V\u011Bk</strong> \u2014 \u010D\u00EDseln\u00E9 pole s tla\u010D\u00EDtky -5, -1, +1, +5 (rozsah 0\u2013150)</li>\
<li><strong>Poran\u011Bn\u00ED t\u011Bla</strong> \u2014 tla\u010D\u00EDtko otev\u00EDraj\u00EDc\u00ED diagram poran\u011Bn\u00ED (viz odd\u00EDl 4)</li>\
<li><strong>Pozn\u00E1mky</strong> \u2014 pole pro dopl\u0148uj\u00EDc\u00ED informace (poran\u011Bn\u00ED, mechanismus \u00FArazu atd.)</li>\
</ul>\
<p>Dostupn\u00E9 akce:</p>\
<ul>\
<li><strong>\u2713 POTVRDIT PACIENTA</strong> \u2014 p\u0159id\u00E1 pacienta do seznamu</li>\
<li><strong>\u21BA ZNOVU</strong> \u2014 resetuje pr\u016Fvodce na krok 1</li>\
<li><strong>ZM\u011ANIT BARVU RU\u010CN\u011A</strong> \u2014 otev\u0159e \u0159adu 4 tla\u010D\u00EDtek (T1\u2013T4) pro ru\u010Dn\u00ED zm\u011Bnu kategorie</li>\
</ul>\
<h3>Seznam pacient\u016F na m\u00EDst\u011B</h3>\
<p>Pod pr\u016Fvodcem se zobrazuje seznam \u201EPacienti na m\u00EDst\u011B\u201C \u0159azen\u00FD podle priority (T1 \u2192 T2 \u2192 T3 \u2192 T4).</p>\
<p>Ka\u017Ed\u00E1 karta pacienta obsahuje:</p>\
<ul>\
<li>Barevn\u00FD \u0161t\u00EDtek (nap\u0159. P-001)</li>\
<li>Kategorii, pohlav\u00ED/v\u011Bk, \u010Das registrace</li>\
<li>Pole pozn\u00E1mek (editovateln\u00E9)</li>\
<li>Tla\u010D\u00EDtko poran\u011Bn\u00ED (\uD83E\uDE7B) se souhrnem</li>\
<li>4 barevn\u00E9 te\u010Dky re-tri\u00E1\u017Ee (T1\u2013T4) \u2014 klikn\u011Bte pro zm\u011Bnu kategorie</li>\
<li>Tla\u010D\u00EDtko smaz\u00E1n\u00ED (\u2715)</li>\
<li>Zna\u010Dku re-tri\u00E1\u017Ee (\u21BAn), pokud byla kategorie m\u011Bn\u011Bna</li>\
</ul>\
<h3>Seznam v transportu</h3>\
<p>Sekce \u201EV transportu\u201C se zobraz\u00ED, kdy\u017E jsou pacienti na cest\u011B do nemocnice. Ka\u017Ed\u00E1 karta obsahuje:</p>\
<ul>\
<li>\u0160t\u00EDtek pacienta s barvou kategorie</li>\
<li>Trasu: T\u00FDm \u2192 Nemocnice \u2192 \u010Das odjezdu</li>\
<li>Tla\u010D\u00EDtko \u201Ezm\u011Bnit\u201C \u2014 zm\u011Bna c\u00EDlov\u00E9 nemocnice</li>\
<li>Tla\u010D\u00EDtko \u201E\u2713 Doru\u010Den\u201C \u2014 ozna\u010D\u00ED doru\u010Den\u00ED a uvoln\u00ED t\u00FDm ZZS</li>\
</ul>\
<hr>\
<h2>4. Diagram poran\u011Bn\u00ED t\u011Bla</h2>\
<p>Tla\u010D\u00EDtko \u201E\uD83E\uDE7B Poran\u011Bn\u00ED t\u011Bla\u201C otev\u00EDr\u00E1 interaktivn\u00ED diagram t\u011Bla.</p>\
<h3>Zobrazen\u00ED diagramu</h3>\
<p>Zobrazeny jsou dva obrysy t\u011Bla vedle sebe:</p>\
<ul>\
<li><strong>P\u0158EDN\u00CD</strong> (front) \u2014 hlava, hrudn\u00EDk, b\u0159icho, pa\u017Ee, nohy</li>\
<li><strong>ZADN\u00CD</strong> (back) \u2014 hlava, horn\u00ED \u010D\u00E1st zad, doln\u00ED \u010D\u00E1st zad, pa\u017Ee, nohy</li>\
</ul>\
<p>Po stran\u00E1ch jsou viditeln\u00E1 ozna\u010Den\u00ED stran: <strong>L</strong> (lev\u00E1) a <strong>P</strong> (prav\u00E1), obr\u00E1cen\u00E1 pro zadn\u00ED pohled.</p>\
<p>Klikn\u011Bte na z\u00F3nu t\u011Bla pro jej\u00ED v\u00FDb\u011Br.</p>\
<h3>Panel poran\u011Bn\u00ED z\u00F3ny</h3>\
<p>Po v\u00FDb\u011Bru z\u00F3ny se otev\u0159e panel se 7 typy poran\u011Bn\u00ED k za\u0161krtnut\u00ED:</p>\
<ul>\
<li>Zlomenina</li>\
<li>Krv\u00E1cen\u00ED</li>\
<li>Pop\u00E1lenina</li>\
<li>R\u00E1na</li>\
<li>Otok</li>\
<li>Bolest</li>\
<li>Amputace</li>\
</ul>\
<p>Za\u0161krtnut\u00E9 typy jsou ozna\u010Deny \u2713. Ka\u017Ed\u00FD lze zapnout/vypnout kliknut\u00EDm.</p>\
<p>Ve spodn\u00ED \u010D\u00E1sti panelu:</p>\
<ul>\
<li><strong>\u2715 NE</strong> \u2014 zahod\u00ED zm\u011Bny v t\u00E9to z\u00F3n\u011B</li>\
<li><strong>\u2713 ANO</strong> \u2014 potvrd\u00ED poran\u011Bn\u00ED pro vybranou z\u00F3nu</li>\
</ul>\
<h3>Potvrzen\u00ED diagramu</h3>\
<p>Po zazna\u010Den\u00ED poran\u011Bn\u00ED ve v\u0161ech pot\u0159ebn\u00FDch z\u00F3n\u00E1ch:</p>\
<ul>\
<li><strong>\u2713 ANO</strong> \u2014 potvrd\u00ED cel\u00FD diagram poran\u011Bn\u00ED</li>\
<li><strong>\u2715 NE</strong> \u2014 zahod\u00ED v\u0161echny zm\u011Bny a vr\u00E1t\u00ED stav p\u0159ed otev\u0159en\u00EDm</li>\
</ul>\
<p>Zazna\u010Den\u00E1 poran\u011Bn\u00ED jsou viditeln\u00E1:</p>\
<ul>\
<li>Na kart\u011B pacienta jako zkr\u00E1cen\u00FD souhrn (nap\u0159. \u201E\uD83E\uDE7B Hlava: Zlomenina, Krv\u00E1cen\u00ED\u201C)</li>\
<li>V hl\u00E1\u0161en\u00ED u dan\u00E9ho pacienta</li>\
</ul>\
<hr>\
<h2>5. Disponov\u00E1n\u00ED</h2>\
<h3>Mod\u00E1ln\u00ED okna konfigurace</h3>\
<p>P\u0159i prvn\u00EDm vstupu do z\u00E1lo\u017Eky Disponov\u00E1n\u00ED se postupn\u011B zobraz\u00ED 3 mod\u00E1ln\u00ED okna:</p>\
<p><strong>1. Vedouc\u00ED zdravotnick\u00E9 slu\u017Eby (GDM)</strong></p>\
<ul>\
<li>Pole pro jm\u00E9no a p\u0159\u00EDjmen\u00ED GDM</li>\
<li>Tla\u010D\u00EDtko importu dat od dispe\u010Dera (viz odd\u00EDl 6)</li>\
<li>P\u0158ESKO\u010CIT nebo ULO\u017DIT</li>\
</ul>\
<p><strong>2. T\u00FDmy ZZS</strong></p>\
<ul>\
<li>Ot\u00E1zka: \u201EZn\u00E1te t\u00FDmy ZZS vyslan\u00E9 na m\u00EDsto?\u201C</li>\
<li>ANO \u2192 formul\u00E1\u0159 pro p\u0159id\u00E1v\u00E1n\u00ED t\u00FDm\u016F (n\u00E1zev + tla\u010D\u00EDtko p\u0159idat)</li>\
<li>NE \u2192 pou\u017Eij\u00ED se v\u00FDchoz\u00ED t\u00FDmy (S-01, S-02, P-01, P-02, P-03, LPR)</li>\
<li>POTVRDIT nebo P\u0158ESKO\u010CIT (V\u00DDCHOZ\u00CD)</li>\
</ul>\
<p><strong>3. C\u00EDlov\u00E9 nemocnice</strong></p>\
<ul>\
<li>Formul\u00E1\u0159 pro p\u0159id\u00E1v\u00E1n\u00ED nemocnic s kapacitou:\
<ul>\
<li>N\u00E1zev nemocnice</li>\
<li>\uD83D\uDD34 \u010Cerven\u00E1 kapacita (T1) \u2014 po\u010Det l\u016F\u017Eek</li>\
<li>\uD83D\uDFE1 \u017Dlut\u00E1 kapacita (T2) \u2014 po\u010Det l\u016F\u017Eek</li>\
</ul></li>\
<li>POTVRDIT nebo P\u0158ESKO\u010CIT (V\u00DDCHOZ\u00CD)</li>\
</ul>\
<p>Ka\u017Ed\u00E9 mod\u00E1ln\u00ED okno se zobraz\u00ED pouze jednou za ud\u00E1lost.</p>\
<h3>Formul\u00E1\u0159 disponov\u00E1n\u00ED</h3>\
<p>Sekce \u201EDisponovat transport\u201C obsahuje:</p>\
<ol>\
<li><strong>Pacient</strong> \u2014 rozbalovac\u00ED seznam pacient\u016F na m\u00EDst\u011B, \u0159azen\u00FD podle priority</li>\
<li><strong>T\u00FDm ZZS</strong> \u2014 seznam dostupn\u00FDch t\u00FDm\u016F (obsazen\u00E9 t\u00FDmy jsou skryt\u00E9)</li>\
<li><strong>Nemocnice</strong> \u2014 seznam nemocnic s informac\u00ED o obsazenosti:\
<ul>\
<li>Form\u00E1t: \u201EN\u00E1zev nemocnice [\uD83D\uDD34 obsazeno/celkem \uD83D\uDFE1 obsazeno/celkem]\u201C</li>\
<li>Nemocnice bez voln\u00FDch m\u00EDst v kategorii pacienta jsou ozna\u010Deny varov\u00E1n\u00EDm</li>\
</ul></li>\
<li><strong>DISPONOVAT TRANSPORT</strong> \u2014 tla\u010D\u00EDtko aktivn\u00ED po vypln\u011Bn\u00ED v\u0161ech pol\u00ED</li>\
</ol>\
<h3>Panely spr\u00E1vy</h3>\
<p>Pod formul\u00E1\u0159em se nach\u00E1zej\u00ED dva panely (na \u0161irok\u00FDch obrazovk\u00E1ch vedle sebe, na \u00FAzk\u00FDch pod sebou):</p>\
<p><strong>Nemocnice</strong> (l\u016F\u017Eka CELKEM):</p>\
<ul>\
<li>Seznam nemocnic s editovateln\u00FDmi poli kapacity (\uD83D\uDD34 a \uD83D\uDFE1)</li>\
<li>P\u0159id\u00E1v\u00E1n\u00ED nov\u00FDch nemocnic</li>\
<li>Maz\u00E1n\u00ED nemocnic (\u2715)</li>\
<li>Sbalen\u00ED/rozbalen\u00ED seznamu</li>\
</ul>\
<p><strong>T\u00FDmy ZZS:</strong></p>\
<ul>\
<li>Seznam t\u00FDm\u016F s tla\u010D\u00EDtky pro smaz\u00E1n\u00ED</li>\
<li>P\u0159id\u00E1v\u00E1n\u00ED nov\u00FDch t\u00FDm\u016F</li>\
<li>Sbalen\u00ED/rozbalen\u00ED seznamu</li>\
</ul>\
<h3>Historie transport\u016F</h3>\
<p>Ve spodn\u00ED \u010D\u00E1sti sekce disponov\u00E1n\u00ED (ve v\u00FDchoz\u00EDm stavu sbalen\u00E1). Rozbalte pro zobrazen\u00ED chronologick\u00E9ho seznamu v\u0161ech transport\u016F s:</p>\
<ul>\
<li>\u0160t\u00EDtek pacienta s barvou</li>\
<li>T\u00FDm \u2192 Nemocnice \u2192 \u010Das odjezdu</li>\
<li>Stav (v transportu / doru\u010Den)</li>\
</ul>\
<hr>\
<h2>6. Import dat od dispe\u010Dera</h2>\
<p>Funkce umo\u017E\u0148uje dispe\u010Derovi odeslat data (n\u00E1zev ud\u00E1losti, GDM, t\u00FDmy ZZS, nemocnice s kapacitou) z\u00E1chran\u00E1\u0159i v ter\u00E9nu.</p>\
<h3>Metoda 1 \u2014 SMS odkaz (jedno kliknut\u00ED)</h3>\
<p>Dispe\u010Der ode\u0161le SMS s odkazem ve form\u00E1tu:</p>\
<pre><code>https://0xjaqbek.github.io/triage/?i=DATA_BASE64</code></pre>\
<p>Po kliknut\u00ED na odkaz:</p>\
<ol>\
<li>Aplikace se otev\u0159e z cache (nevy\u017Eaduje internet, pokud je nainstalov\u00E1na)</li>\
<li>Zobraz\u00ED se n\u00E1hled dat: n\u00E1zev ud\u00E1losti, GDM, t\u00FDmy, nemocnice</li>\
<li><strong>IMPORTOVAT</strong> \u2014 importuje data a otev\u0159e t\u0159\u00EDd\u011Bn\u00ED</li>\
<li><strong>ZAM\u00CDTNOUT</strong> \u2014 ignoruje data</li>\
</ol>\
<h3>Metoda 2 \u2014 Vlo\u017Een\u00ED dat</h3>\
<p>Pokud odkaz neotev\u0159e aplikaci (zablokovan\u00E1 za\u0159\u00EDzen\u00ED):</p>\
<ol>\
<li>Otev\u0159ete aplikaci, p\u0159ejd\u011Bte do Disponov\u00E1n\u00ED</li>\
<li>V mod\u00E1ln\u00EDm okn\u011B GDM klikn\u011Bte na <strong>\uD83D\uDCE5 IMPORTOVAT DATA OD DISPE\u010CERA</strong></li>\
<li>Vlo\u017Ete obsah SMS (cel\u00FD odkaz nebo samotn\u00FD k\u00F3d Base64)</li>\
<li>N\u00E1hled dat se zobraz\u00ED automaticky</li>\
<li><strong>IMPORTOVAT</strong> \u2014 potvrd\u00ED data</li>\
</ol>\
<h3>Import v pr\u016Fb\u011Bhu ud\u00E1losti</h3>\
<p>Pokud je ud\u00E1lost ji\u017E zah\u00E1jena a m\u00E1te vyt\u0159\u00EDd\u011Bn\u00E9 pacienty:</p>\
<ul>\
<li><strong>Pacienti</strong> \u2014 zachov\u00E1ni (nikdy nejsou maz\u00E1ni)</li>\
<li><strong>KAM</strong> \u2014 zachov\u00E1n</li>\
<li><strong>GDM</strong> \u2014 nahrazen daty od dispe\u010Dera</li>\
<li><strong>T\u00FDmy ZZS</strong> \u2014 nahrazeny daty od dispe\u010Dera</li>\
<li><strong>Nemocnice</strong> \u2014 nahrazeny daty od dispe\u010Dera</li>\
<li><strong>N\u00E1zev ud\u00E1losti</strong> \u2014 slou\u010Den: \u201EV\u00E1\u0161 n\u00E1zev | N\u00E1zev dispe\u010Dera (dispe\u010Der)\u201C</li>\
</ul>\
<p>\u017Dlut\u00E9 varov\u00E1n\u00ED v n\u00E1hledu informuje o zachov\u00E1n\u00ED pacient\u016F a KAM.</p>\
<hr>\
<h2>7. Re\u017Eim dispe\u010Dera</h2>\
<p>Dostupn\u00FD p\u0159es odkaz \u201ERe\u017Eim dispe\u010Dera \u2192\u201C na \u00FAvodn\u00ED obrazovce nebo na adrese <code>/dyspozytor/</code>.</p>\
<p>Str\u00E1nka umo\u017E\u0148uje dispe\u010Derovi p\u0159ipravit a odeslat data pro t\u00FDm v ter\u00E9nu.</p>\
<h3>Formul\u00E1\u0159</h3>\
<ol>\
<li><strong>N\u00E1zev ud\u00E1losti</strong> \u2014 nap\u0159. \u201EMCI Praha-H\u00E1je\u201C</li>\
<li><strong>Hlavn\u00ED dispe\u010Der zdravotnick\u00E9 slu\u017Eby (GDM)</strong> \u2014 jm\u00E9no a p\u0159\u00EDjmen\u00ED</li>\
<li><strong>T\u00FDmy ZZS</strong> \u2014 p\u0159id\u00E1vejte jednotliv\u011B (n\u00E1zev + tla\u010D\u00EDtko \u201E+\u201C)</li>\
<li><strong>C\u00EDlov\u00E9 nemocnice</strong> \u2014 n\u00E1zev + kapacita \uD83D\uDD34 a \uD83D\uDFE1 (+ tla\u010D\u00EDtko p\u0159idat)</li>\
</ol>\
<h3>Odesl\u00E1n\u00ED</h3>\
<ul>\
<li><strong>\uD83D\uDCCB N\u00E1hled dat</strong> \u2014 zobraz\u00ED souhrn s velikost\u00ED ve znac\u00EDch a po\u010Dtem SMS</li>\
<li><strong>\uD83D\uDCF1 Odeslat SMS</strong> \u2014 otev\u0159e SMS aplikaci s p\u0159ipraven\u00FDm odkazem</li>\
<li><strong>\uD83D\uDCCB Kop\u00EDrovat data</strong> \u2014 zkop\u00EDruje odkaz do schr\u00E1nky</li>\
</ul>\
<p>Data jsou k\u00F3dov\u00E1na v Base64 (kompatibilita s SMS GSM-7 \u2014 a\u017E 1530 znak\u016F v 10 segmentech SMS). Pojme p\u0159ibli\u017En\u011B 20 nemocnic a 20 t\u00FDm\u016F.</p>\
<hr>\
<h2>8. Hl\u00E1\u0161en\u00ED</h2>\
<h3>Vizu\u00E1ln\u00ED hl\u00E1\u0161en\u00ED</h3>\
<p>Sekce \u201EHl\u00E1\u0161en\u00ED pro dispe\u010Dera\u201C se generuje automaticky a obsahuje:</p>\
<p><strong>Z\u00E1hlav\u00ED:</strong></p>\
<ul>\
<li>N\u00E1zev ud\u00E1losti, \u010Das zah\u00E1jen\u00ED, \u010Das hl\u00E1\u0161en\u00ED</li>\
<li>KAM a GDM (pokud jsou zad\u00E1ny)</li>\
<li>\u010Cas ukon\u010Den\u00ED (pokud je ud\u00E1lost ukon\u010Dena)</li>\
</ul>\
<p><strong>Souhrn:</strong></p>\
<ul>\
<li>Barevn\u00E9 \u0161t\u00EDtky s po\u010Dtem pacient\u016F v ka\u017Ed\u00E9 kategorii</li>\
<li>Celkov\u00FD po\u010Det pacient\u016F</li>\
</ul>\
<p><strong>Nemocnice</strong> (samostatn\u00FD blok pro ka\u017Edou nemocnici s transporty):</p>\
<ul>\
<li>N\u00E1zev nemocnice, po\u010Det pacient\u016F, informace o kapacit\u011B</li>\
<li>Seznam pacient\u016F s: \u0161t\u00EDtek, v\u011Bk/pohlav\u00ED, t\u00FDm, \u010Das, stav (V TRANSPORTU / DORU\u010CEN)</li>\
<li>Historie re-tri\u00E1\u017Ee (nap\u0159. \u21BAT1\u2192T2\u2192T1)</li>\
<li>Historie zm\u011Bn nemocnice (nap\u0159. \u21C4Nemocnice1\u2192Nemocnice2)</li>\
<li>Souhrn poran\u011Bn\u00ED</li>\
</ul>\
<p><strong>Pacienti na m\u00EDst\u011B</strong> (pokud n\u011Bkdo zb\u00FDv\u00E1):</p>\
<ul>\
<li>Seznam s: \u0161t\u00EDtek, v\u011Bk/pohlav\u00ED, kategorie, pozn\u00E1mky, poran\u011Bn\u00ED</li>\
</ul>\
<h3>Textov\u00E9 hl\u00E1\u0161en\u00ED</h3>\
<p>Tla\u010D\u00EDtko \u201E\uD83D\uDCCB Textov\u00E9 hl\u00E1\u0161en\u00ED\u201C otev\u0159e mod\u00E1ln\u00ED okno s \u00FApln\u00FDm hl\u00E1\u0161en\u00EDm v textov\u00E9m form\u00E1tu. Obsahuje kompletn\u00ED seznam pacient\u016F s pozn\u00E1mkami, pohlav\u00EDm, v\u011Bkem a cestou t\u0159\u00EDd\u011Bn\u00ED.</p>\
<h3>Odesl\u00E1n\u00ED hl\u00E1\u0161en\u00ED</h3>\
<ul>\
<li><strong>\uD83D\uDCCB Kop\u00EDrovat do schr\u00E1nky</strong> \u2014 zkop\u00EDruje \u00FApln\u00FD text hl\u00E1\u0161en\u00ED</li>\
<li><strong>\uD83D\uDCE4 Odeslat</strong> \u2014 otev\u0159e mo\u017Enosti:\
<ul>\
<li><strong>SMS</strong> \u2014 otev\u0159e nativn\u00ED SMS aplikaci s obsahem hl\u00E1\u0161en\u00ED</li>\
<li><strong>Email</strong> \u2014 otev\u0159e emailov\u00E9ho klienta s p\u0159edm\u011Btem a obsahem hl\u00E1\u0161en\u00ED</li>\
</ul></li>\
</ul>\
<h3>Ukon\u010Den\u00ED ud\u00E1losti</h3>\
<p>Tla\u010D\u00EDtko <strong>UKON\u010CIT UD\u00C1LOST</strong> v z\u00E1hlav\u00ED hl\u00E1\u0161en\u00ED:</p>\
<ul>\
<li>Ulo\u017E\u00ED \u010Das ukon\u010Den\u00ED</li>\
<li>Zm\u011Bn\u00ED se na <strong>ZRU\u0160IT UKON\u010CEN\u00CD</strong> (vratn\u00E9)</li>\
<li>\u010Cas ukon\u010Den\u00ED se zobraz\u00ED v hl\u00E1\u0161en\u00ED</li>\
</ul>\
<hr>\
<h2>9. Re-tri\u00E1\u017E a zm\u011Bna nemocnice</h2>\
<h3>Re-tri\u00E1\u017E</h3>\
<p>Na kart\u011B pacienta v sekci \u201EPacienti na m\u00EDst\u011B\u201C se nach\u00E1zej\u00ED 4 barevn\u00E9 te\u010Dky (T1\u2013T4). Kliknut\u00ED na jinou kategorii ne\u017E aktu\u00E1ln\u00ED:</p>\
<ol>\
<li>Otev\u0159e potvrzovac\u00ED okno: \u201EZm\u011Bnit kategorii pacienta P-001 z T1 na T2?\u201C</li>\
<li><strong>POTVRDIT</strong> \u2014 zm\u011Bn\u00ED kategorii, ulo\u017E\u00ED do historie</li>\
<li><strong>ZRU\u0160IT</strong> \u2014 bez zm\u011Bn</li>\
</ol>\
<p>Historie re-tri\u00E1\u017Ee:</p>\
<ul>\
<li>Zna\u010Dka \u21BAn na kart\u011B pacienta (n = po\u010Det zm\u011Bn)</li>\
<li>\u00DApln\u00E1 historie v hl\u00E1\u0161en\u00ED (nap\u0159. T1\u2192T2\u2192T1 s \u010Dasy)</li>\
</ul>\
<h3>Zm\u011Bna nemocnice v transportu</h3>\
<p>Na kart\u011B pacienta \u201EV transportu\u201C tla\u010D\u00EDtko \u201Ezm\u011Bnit\u201C:</p>\
<ol>\
<li>Otev\u0159e mod\u00E1ln\u00ED okno s aktu\u00E1ln\u00ED nemocnic\u00ED</li>\
<li>Rozbalovac\u00ED seznam s dostupn\u00FDmi nemocnicemi (s informac\u00ED o kapacit\u011B)</li>\
<li><strong>POTVRDIT</strong> \u2014 zm\u011Bn\u00ED nemocnici, ulo\u017E\u00ED do historie</li>\
<li><strong>ZRU\u0160IT</strong> \u2014 bez zm\u011Bn</li>\
</ol>\
<p>Historie zm\u011Bn nemocnice je viditeln\u00E1 v hl\u00E1\u0161en\u00ED (\u21C4Nemocnice1\u2192Nemocnice2).</p>\
<hr>\
<h2>10. Instalace a offline re\u017Eim</h2>\
<h3>Instalace jako PWA</h3>\
<p><strong>Android (Chrome):</strong></p>\
<ol>\
<li>Otev\u0159ete aplikaci v Chrome</li>\
<li>Klepn\u011Bte na \u22EE (menu) v prav\u00E9m horn\u00EDm rohu</li>\
<li>Zvolte \u201EP\u0159idat na domovskou obrazovku\u201C</li>\
<li>Klepn\u011Bte na \u201ENainstalovat\u201C</li>\
</ol>\
<p><strong>iOS (Safari):</strong></p>\
<ol>\
<li>Otev\u0159ete aplikaci v Safari</li>\
<li>Klepn\u011Bte na \u2399 (Sd\u00EDlet)</li>\
<li>Posu\u0148te dol\u016F a zvolte \u201EP\u0159idat na plochu\u201C</li>\
</ol>\
<p>Po instalaci aplikace funguje jako samostatn\u00E1 aplikace s pln\u00FDm offline re\u017Eimem.</p>\
<h3>Offline re\u017Eim</h3>\
<p>Aplikace se po prvn\u00EDm na\u010Dten\u00ED ulo\u017E\u00ED do cache za\u0159\u00EDzen\u00ED. V\u0161echny funkce funguj\u00ED bez p\u0159ipojen\u00ED k internetu:</p>\
<ul>\
<li>T\u0159\u00EDd\u011Bn\u00ED pacient\u016F</li>\
<li>Disponov\u00E1n\u00ED transportu</li>\
<li>Generov\u00E1n\u00ED hl\u00E1\u0161en\u00ED</li>\
<li>Import dat (vlo\u017Een\u00ED)</li>\
</ul>\
<p>Internet je pot\u0159eba pouze pro: prvn\u00ED sta\u017Een\u00ED, aktualizaci a odes\u00EDl\u00E1n\u00ED SMS/email\u016F (p\u0159es nativn\u00ED aplikace za\u0159\u00EDzen\u00ED).</p>\
<h3>Sta\u017Een\u00ED jako HTML soubor</h3>\
<p>Tla\u010D\u00EDtko <strong>\u2B07 St\u00E1hnout</strong> na \u00FAvodn\u00ED obrazovce st\u00E1hne aplikaci jako samostatn\u00FD HTML soubor. Lze jej p\u0159en\u00E9st na flash disk a spustit na libovoln\u00E9m po\u010D\u00EDta\u010Di s prohl\u00ED\u017Ee\u010Dem.</p>\
<hr>\
<h2>11. Soukrom\u00ED</h2>\
<ul>\
<li>Ve\u0161ker\u00E1 data jsou uchov\u00E1v\u00E1na <strong>v\u00FDhradn\u011B na za\u0159\u00EDzen\u00ED</strong> (localStorage)</li>\
<li>\u017D\u00E1dn\u00E1 data <strong>nejsou odes\u00EDl\u00E1na</strong> na extern\u00ED servery</li>\
<li>\u017D\u00E1dn\u00E1 analytika, sledov\u00E1n\u00ED, telemetrie</li>\
<li>\u017D\u00E1dn\u00E9 sledovac\u00ED cookies</li>\
<li>Funkce SMS a email vyu\u017E\u00EDvaj\u00ED nativn\u00ED aplikace za\u0159\u00EDzen\u00ED \u2014 aplikace neodes\u00EDl\u00E1 zpr\u00E1vy p\u0159\u00EDmo</li>\
<li>Smaz\u00E1n\u00ED dat: pou\u017Eijte \u201EUkon\u010Dit ud\u00E1lost\u201C nebo vyma\u017Ete data prohl\u00ED\u017Ee\u010De</li>\
</ul>\
<p>\u00DApln\u00E9 z\u00E1sady ochrany soukrom\u00ED jsou dostupn\u00E9 na adrese <code>/privacy/</code>.</p>';

CONTENT.pt = '<h1>Manual de utiliza\u00E7\u00E3o TRIAGE MCI</h1>\
<h2>1. O que \u00E9 o TRIAGE MCI</h2>\
<p>O TRIAGE MCI \u00E9 uma aplica\u00E7\u00E3o web (PWA) para triagem e gest\u00E3o de incidentes com m\u00FAltiplas v\u00EDtimas (MCI), baseada no algoritmo START. Permite:</p>\
<ul>\
<li>Classifica\u00E7\u00E3o de pacientes em 4 categorias (T1\u2013T4)</li>\
<li>Gest\u00E3o de transporte para hospitais</li>\
<li>Monitoriza\u00E7\u00E3o da capacidade hospitalar</li>\
<li>Gera\u00E7\u00E3o e envio de relat\u00F3rios</li>\
<li>Importa\u00E7\u00E3o de dados do operador de central</li>\
</ul>\
<p>A aplica\u00E7\u00E3o funciona totalmente offline. Todos os dados s\u00E3o armazenados exclusivamente no dispositivo do utilizador \u2014 nenhuma informa\u00E7\u00E3o \u00E9 enviada para servidores externos.</p>\
<p>Suporta 7 idiomas: polaco, ingl\u00EAs, italiano, franc\u00EAs, alem\u00E3o, checo, portugu\u00EAs.</p>\
<hr>\
<h2>2. In\u00EDcio do incidente</h2>\
<h3>Ecr\u00E3 inicial</h3>\
<p>Ao abrir a aplica\u00E7\u00E3o, surge o ecr\u00E3 de configura\u00E7\u00E3o do incidente:</p>\
<ol>\
<li><strong>Sele\u00E7\u00E3o de idioma</strong> \u2014 seletor no topo do ecr\u00E3. A altera\u00E7\u00E3o do idioma traduz imediatamente toda a interface.</li>\
<li><strong>Nome do incidente</strong> \u2014 campo obrigat\u00F3rio. Introduza a localiza\u00E7\u00E3o e o tipo de incidente (ex.: \u201CAcidente A1 km 312\u201D). Aparecer\u00E1 nos relat\u00F3rios.</li>\
<li><strong>KAM</strong> \u2014 campo opcional. Respons\u00E1vel pela A\u00E7\u00E3o M\u00E9dica \u2014 nome da pessoa que coordena as opera\u00E7\u00F5es no local.</li>\
<li><strong>Mostrar dicas</strong> \u2014 interruptor que ativa bal\u00F5es com sugest\u00F5es contextuais em toda a aplica\u00E7\u00E3o. \u00DAtil na primeira utiliza\u00E7\u00E3o.</li>\
<li><strong>INICIAR TRIAGE</strong> \u2014 inicia o incidente e arranca o cron\u00F3metro.</li>\
</ol>\
<h3>Retomar incidente</h3>\
<p>Se existir um incidente guardado na mem\u00F3ria do dispositivo, ao iniciar surgir\u00E1 a op\u00E7\u00E3o:</p>\
<ul>\
<li><strong>CONTINUAR</strong> \u2014 retoma o incidente guardado com todos os dados</li>\
<li><strong>NOVO INCIDENTE</strong> \u2014 apaga os dados anteriores e come\u00E7a de novo</li>\
</ul>\
<hr>\
<h2>3. Triagem (algoritmo START)</h2>\
<h3>Navega\u00E7\u00E3o</h3>\
<p>A aplica\u00E7\u00E3o tem 3 separadores na parte superior do ecr\u00E3:</p>\
<ul>\
<li><strong>TRIAGEM</strong> \u2014 classifica\u00E7\u00E3o de pacientes</li>\
<li><strong>DESPACHO</strong> \u2014 transporte e gest\u00E3o</li>\
<li><strong>RELAT\u00D3RIO</strong> \u2014 resumo e exporta\u00E7\u00E3o</li>\
</ul>\
<p>A barra de estat\u00EDsticas abaixo da navega\u00E7\u00E3o mostra o n\u00FAmero de pacientes em cada categoria: \uD83D\uDD34 T1, \uD83D\uDFE1 T2, \uD83D\uDFE2 T3, \u26AB T4 e o total.</p>\
<h3>Assistente de triagem START</h3>\
<p>O assistente guia-o atrav\u00E9s do algoritmo START em 6 passos. Em cada passo responde SIM ou N\u00C3O:</p>\
<p><strong>Passo 1 \u2014 O paciente caminha?</strong></p>\
<ul>\
<li>SIM \u2192 T3 Verde (diferido)</li>\
<li>N\u00C3O \u2192 avan\u00E7ar para o passo 2</li>\
</ul>\
<p><strong>Passo 2 \u2014 Respira espontaneamente?</strong></p>\
<ul>\
<li>SIM \u2192 avan\u00E7ar para o passo 4 (avalia\u00E7\u00E3o da frequ\u00EAncia respirat\u00F3ria)</li>\
<li>N\u00C3O \u2192 avan\u00E7ar para o passo 3</li>\
</ul>\
<p><strong>Passo 3 \u2014 Permeabilize a via a\u00E9rea. Respira ap\u00F3s permeabiliza\u00E7\u00E3o?</strong></p>\
<ul>\
<li>SIM \u2192 T1 Vermelho (imediato)</li>\
<li>N\u00C3O \u2192 T4 Preto (\u00F3bito)</li>\
</ul>\
<p><strong>Passo 4 \u2014 A frequ\u00EAncia respirat\u00F3ria \u00E9 normal (\u2264 30/min)?</strong></p>\
<ul>\
<li>SIM \u2192 avan\u00E7ar para o passo 5</li>\
<li>N\u00C3O \u2192 T1 Vermelho (imediato)</li>\
</ul>\
<p><strong>Passo 5 \u2014 O tempo de preenchimento capilar \u00E9 normal (\u2264 2 seg.) e o pulso radial est\u00E1 presente?</strong></p>\
<ul>\
<li>SIM \u2192 avan\u00E7ar para o passo 6</li>\
<li>N\u00C3O \u2192 T1 Vermelho (imediato)</li>\
</ul>\
<p><strong>Passo 6 \u2014 Obedece a comandos simples?</strong></p>\
<ul>\
<li>SIM \u2192 T2 Amarelo (urgente)</li>\
<li>N\u00C3O \u2192 T1 Vermelho (imediato)</li>\
</ul>\
<p>Cada pergunta tem uma dica (hint) vis\u00EDvel abaixo \u2014 descreve como avaliar o respetivo par\u00E2metro.</p>\
<h3>Cart\u00E3o de resultado</h3>\
<p>Ap\u00F3s a conclus\u00E3o da triagem surge o cart\u00E3o de resultado com:</p>\
<ul>\
<li><strong>Marcador colorido</strong> \u2014 quadrado grande com a categoria (T1/T2/T3/T4)</li>\
<li><strong>Percurso decis\u00F3rio</strong> \u2014 mostra o caminho seguido no algoritmo</li>\
<li><strong>Sexo</strong> \u2014 bot\u00F5es M (masculino), F (feminino), ? (desconhecido)</li>\
<li><strong>Idade</strong> \u2014 campo num\u00E9rico com bot\u00F5es -5, -1, +1, +5 (intervalo 0\u2013150)</li>\
<li><strong>Les\u00F5es corporais</strong> \u2014 bot\u00E3o que abre o diagrama de les\u00F5es (ver sec\u00E7\u00E3o 4)</li>\
<li><strong>Notas</strong> \u2014 campo para informa\u00E7\u00F5es adicionais (les\u00F5es, mecanismo de trauma, etc.)</li>\
</ul>\
<p>A\u00E7\u00F5es dispon\u00EDveis:</p>\
<ul>\
<li><strong>\u2713 CONFIRMAR PACIENTE</strong> \u2014 adiciona o paciente \u00E0 lista</li>\
<li><strong>\u21BA RECOME\u00C7AR</strong> \u2014 reinicia o assistente a partir do passo 1</li>\
<li><strong>ALTERAR COR MANUALMENTE</strong> \u2014 abre uma fila de 4 bot\u00F5es (T1\u2013T4) para altera\u00E7\u00E3o manual da categoria</li>\
</ul>\
<h3>Lista de pacientes no local</h3>\
<p>Abaixo do assistente \u00E9 apresentada a lista \u201CPacientes no local\u201D, ordenada por prioridade (T1 \u2192 T2 \u2192 T3 \u2192 T4).</p>\
<p>Cada cart\u00E3o de paciente cont\u00E9m:</p>\
<ul>\
<li>Marcador colorido (ex.: P-001)</li>\
<li>Categoria, sexo/idade, hora de registo</li>\
<li>Campo de notas (edit\u00E1vel)</li>\
<li>Bot\u00E3o de les\u00F5es (\uD83E\uDE7B) com resumo</li>\
<li>4 pontos de retriagem (T1\u2013T4) \u2014 clique para alterar a categoria</li>\
<li>Bot\u00E3o de elimina\u00E7\u00E3o (\u2715)</li>\
<li>Marcador de retriagem (\u21BAn) caso a categoria tenha sido alterada</li>\
</ul>\
<h3>Lista em transporte</h3>\
<p>A sec\u00E7\u00E3o \u201CEm transporte\u201D aparece quando h\u00E1 pacientes a caminho do hospital. Cada cart\u00E3o mostra:</p>\
<ul>\
<li>Marcador do paciente com a cor da categoria</li>\
<li>Rota: Equipa \u2192 Hospital \u2192 hora de sa\u00EDda</li>\
<li>Bot\u00E3o \u201Calterar\u201D \u2014 altera\u00E7\u00E3o do hospital de destino</li>\
<li>Bot\u00E3o \u201C\u2713 Entregue\u201D \u2014 marca como entregue e liberta a equipa de emerg\u00EAncia</li>\
</ul>\
<hr>\
<h2>4. Diagrama de les\u00F5es corporais</h2>\
<p>O bot\u00E3o \u201C\uD83E\uDE7B Les\u00F5es corporais\u201D abre um diagrama corporal interativo.</p>\
<h3>Vista do diagrama</h3>\
<p>S\u00E3o apresentados dois contornos do corpo lado a lado:</p>\
<ul>\
<li><strong>FRENTE</strong> (front) \u2014 cabe\u00E7a, t\u00F3rax, abd\u00F3men, bra\u00E7os, pernas</li>\
<li><strong>COSTAS</strong> (back) \u2014 cabe\u00E7a, parte superior das costas, parte inferior das costas, bra\u00E7os, pernas</li>\
</ul>\
<p>Nos lados s\u00E3o vis\u00EDveis as indica\u00E7\u00F5es de lateralidade: <strong>E</strong> (esquerda) e <strong>D</strong> (direita), invertidas na vista posterior.</p>\
<p>Clique numa zona do corpo para a selecionar.</p>\
<h3>Painel de les\u00F5es da zona</h3>\
<p>Ao selecionar uma zona, abre-se um painel com 7 tipos de les\u00E3o para assinalar:</p>\
<ul>\
<li>Fratura</li>\
<li>Hemorragia</li>\
<li>Queimadura</li>\
<li>Ferida</li>\
<li>Edema</li>\
<li>Dor</li>\
<li>Amputa\u00E7\u00E3o</li>\
</ul>\
<p>Os tipos assinalados s\u00E3o marcados com \u2713. Cada um pode ser ativado/desativado com um clique.</p>\
<p>Na parte inferior do painel:</p>\
<ul>\
<li><strong>\u2715 N\u00C3O</strong> \u2014 descarta as altera\u00E7\u00F5es nesta zona</li>\
<li><strong>\u2713 SIM</strong> \u2014 confirma as les\u00F5es para a zona selecionada</li>\
</ul>\
<h3>Confirma\u00E7\u00E3o do diagrama</h3>\
<p>Ap\u00F3s assinalar as les\u00F5es em todas as zonas necess\u00E1rias:</p>\
<ul>\
<li><strong>\u2713 SIM</strong> \u2014 confirma todo o diagrama de les\u00F5es</li>\
<li><strong>\u2715 N\u00C3O</strong> \u2014 descarta todas as altera\u00E7\u00F5es e regressa ao estado anterior \u00E0 abertura</li>\
</ul>\
<p>As les\u00F5es assinaladas s\u00E3o vis\u00EDveis:</p>\
<ul>\
<li>No cart\u00E3o do paciente como resumo abreviado (ex.: \u201C\uD83E\uDE7B Cabe\u00E7a: Fratura, Hemorragia\u201D)</li>\
<li>No relat\u00F3rio junto ao respetivo paciente</li>\
</ul>\
<hr>\
<h2>5. Despacho</h2>\
<h3>Janelas modais de configura\u00E7\u00E3o</h3>\
<p>Ao entrar pela primeira vez no separador Despacho, surgem sequencialmente 3 janelas modais:</p>\
<p><strong>1. Diretor de Gest\u00E3o M\u00E9dica (GDM)</strong></p>\
<ul>\
<li>Campo para nome do GDM</li>\
<li>Bot\u00E3o de importa\u00E7\u00E3o de dados do operador de central (ver sec\u00E7\u00E3o 6)</li>\
<li>SALTAR ou GUARDAR</li>\
</ul>\
<p><strong>2. Equipas de emerg\u00EAncia</strong></p>\
<ul>\
<li>Pergunta: \u201CConhece as equipas de emerg\u00EAncia enviadas para o local?\u201D</li>\
<li>SIM \u2192 formul\u00E1rio para adicionar equipas (nome + bot\u00E3o adicionar)</li>\
<li>N\u00C3O \u2192 utilizar equipas predefinidas (S-01, S-02, P-01, P-02, P-03, LPR)</li>\
<li>CONFIRMAR ou SALTAR (PREDEFINIDAS)</li>\
</ul>\
<p><strong>3. Hospitais de destino</strong></p>\
<ul>\
<li>Formul\u00E1rio para adicionar hospitais com capacidade:\
<ul>\
<li>Nome do hospital</li>\
<li>\uD83D\uDD34 Capacidade vermelha (T1) \u2014 n\u00FAmero de camas</li>\
<li>\uD83D\uDFE1 Capacidade amarela (T2) \u2014 n\u00FAmero de camas</li>\
</ul></li>\
<li>CONFIRMAR ou SALTAR (PREDEFINIDOS)</li>\
</ul>\
<p>Cada janela modal aparece apenas uma vez por incidente.</p>\
<h3>Formul\u00E1rio de despacho</h3>\
<p>A sec\u00E7\u00E3o \u201CDespachar transporte\u201D cont\u00E9m:</p>\
<ol>\
<li><strong>Paciente</strong> \u2014 lista pendente com pacientes no local, ordenada por prioridade</li>\
<li><strong>Equipa de emerg\u00EAncia</strong> \u2014 lista de equipas dispon\u00EDveis (equipas ocupadas ficam ocultas)</li>\
<li><strong>Hospital</strong> \u2014 lista de hospitais com informa\u00E7\u00E3o de ocupa\u00E7\u00E3o:\
<ul>\
<li>Formato: \u201CNome do hospital [\uD83D\uDD34 ocupados/total \uD83D\uDFE1 ocupados/total]\u201D</li>\
<li>Hospitais sem vagas na categoria do paciente assinalados com aviso</li>\
</ul></li>\
<li><strong>DESPACHAR TRANSPORTE</strong> \u2014 bot\u00E3o ativo quando todos os campos est\u00E3o preenchidos</li>\
</ol>\
<h3>Pain\u00E9is de gest\u00E3o</h3>\
<p>Abaixo do formul\u00E1rio encontram-se dois pain\u00E9is (lado a lado em ecr\u00E3s largos, sobrepostos em ecr\u00E3s estreitos):</p>\
<p><strong>Hospitais</strong> (camas TOTAIS):</p>\
<ul>\
<li>Lista de hospitais com campos de capacidade edit\u00E1veis (\uD83D\uDD34 e \uD83D\uDFE1)</li>\
<li>Adi\u00E7\u00E3o de novos hospitais</li>\
<li>Elimina\u00E7\u00E3o de hospitais (\u2715)</li>\
<li>Expandir/recolher a lista</li>\
</ul>\
<p><strong>Equipas de emerg\u00EAncia:</strong></p>\
<ul>\
<li>Lista de equipas com bot\u00F5es de elimina\u00E7\u00E3o</li>\
<li>Adi\u00E7\u00E3o de novas equipas</li>\
<li>Expandir/recolher a lista</li>\
</ul>\
<h3>Hist\u00F3rico de transportes</h3>\
<p>Na parte inferior da sec\u00E7\u00E3o de despacho (recolhido por defeito). Expanda para ver a lista cronol\u00F3gica de todos os transportes com:</p>\
<ul>\
<li>Marcador do paciente com cor</li>\
<li>Equipa \u2192 Hospital \u2192 hora de sa\u00EDda</li>\
<li>Estado (em transporte / entregue)</li>\
</ul>\
<hr>\
<h2>6. Importa\u00E7\u00E3o de dados do operador de central</h2>\
<p>Esta fun\u00E7\u00E3o permite ao operador de central enviar dados (nome do incidente, GDM, equipas de emerg\u00EAncia, hospitais com capacidade) para o socorrista no terreno.</p>\
<h3>M\u00E9todo 1 \u2014 Link por SMS (um clique)</h3>\
<p>O operador de central envia um SMS com um link no formato:</p>\
<pre><code>https://0xjaqbek.github.io/triage/?i=DADOS_BASE64</code></pre>\
<p>Ao clicar no link:</p>\
<ol>\
<li>A aplica\u00E7\u00E3o abre a partir da cache (n\u00E3o necessita de internet se estiver instalada)</li>\
<li>Surge uma pr\u00E9-visualiza\u00E7\u00E3o dos dados: nome do incidente, GDM, equipas, hospitais</li>\
<li><strong>IMPORTAR</strong> \u2014 importa os dados e abre a triagem</li>\
<li><strong>REJEITAR</strong> \u2014 ignora os dados</li>\
</ol>\
<h3>M\u00E9todo 2 \u2014 Colar dados</h3>\
<p>Se o link n\u00E3o abrir a aplica\u00E7\u00E3o (dispositivos bloqueados):</p>\
<ol>\
<li>Abra a aplica\u00E7\u00E3o, v\u00E1 ao separador Despacho</li>\
<li>Na janela modal do GDM clique em <strong>\uD83D\uDCE5 IMPORTAR DADOS DO OPERADOR</strong></li>\
<li>Cole o conte\u00FAdo do SMS (o link completo ou apenas o c\u00F3digo Base64)</li>\
<li>A pr\u00E9-visualiza\u00E7\u00E3o dos dados surgir\u00E1 automaticamente</li>\
<li><strong>IMPORTAR</strong> \u2014 confirma os dados</li>\
</ol>\
<h3>Importa\u00E7\u00E3o durante o incidente</h3>\
<p>Se o incidente j\u00E1 estiver em curso e tiver pacientes triados:</p>\
<ul>\
<li><strong>Pacientes</strong> \u2014 mantidos (nunca s\u00E3o eliminados)</li>\
<li><strong>KAM</strong> \u2014 mantido</li>\
<li><strong>GDM</strong> \u2014 substitu\u00EDdo pelos dados do operador</li>\
<li><strong>Equipas de emerg\u00EAncia</strong> \u2014 substitu\u00EDdas pelos dados do operador</li>\
<li><strong>Hospitais</strong> \u2014 substitu\u00EDdos pelos dados do operador</li>\
<li><strong>Nome do incidente</strong> \u2014 combinado: \u201CO seu nome | Nome do operador (operador)\u201D</li>\
</ul>\
<p>Um aviso amarelo na pr\u00E9-visualiza\u00E7\u00E3o informa sobre a manuten\u00E7\u00E3o dos pacientes e do KAM.</p>\
<hr>\
<h2>7. Modo operador de central</h2>\
<p>Acess\u00EDvel atrav\u00E9s do link \u201CModo operador de central \u2192\u201D no ecr\u00E3 inicial ou no endere\u00E7o <code>/dyspozytor/</code>.</p>\
<p>Esta p\u00E1gina permite ao operador de central preparar e enviar dados para a equipa no terreno.</p>\
<h3>Formul\u00E1rio</h3>\
<ol>\
<li><strong>Nome do incidente</strong> \u2014 ex.: \u201CMCI Lisboa-Expo\u201D</li>\
<li><strong>Diretor de Gest\u00E3o M\u00E9dica (GDM)</strong> \u2014 nome completo</li>\
<li><strong>Equipas de emerg\u00EAncia</strong> \u2014 adicionar uma a uma (nome + bot\u00E3o \u201C+\u201D)</li>\
<li><strong>Hospitais de destino</strong> \u2014 nome + capacidade \uD83D\uDD34 e \uD83D\uDFE1 (+ bot\u00E3o adicionar)</li>\
</ol>\
<h3>Envio</h3>\
<ul>\
<li><strong>\uD83D\uDCCB Pr\u00E9-visualiza\u00E7\u00E3o dos dados</strong> \u2014 mostra o resumo com o tamanho em caracteres e n\u00FAmero de SMS</li>\
<li><strong>\uD83D\uDCF1 Enviar SMS</strong> \u2014 abre a aplica\u00E7\u00E3o de SMS com o link pronto</li>\
<li><strong>\uD83D\uDCCB Copiar dados</strong> \u2014 copia o link para a \u00E1rea de transfer\u00EAncia</li>\
</ul>\
<p>Os dados s\u00E3o codificados em Base64 (compatibilidade com SMS GSM-7 \u2014 at\u00E9 1530 caracteres em 10 segmentos de SMS). Comporta aproximadamente 20 hospitais e 20 equipas.</p>\
<hr>\
<h2>8. Relat\u00F3rio</h2>\
<h3>Relat\u00F3rio visual</h3>\
<p>A sec\u00E7\u00E3o \u201CRelat\u00F3rio para o operador\u201D \u00E9 gerada automaticamente e cont\u00E9m:</p>\
<p><strong>Cabe\u00E7alho:</strong></p>\
<ul>\
<li>Nome do incidente, hora de in\u00EDcio, hora do relat\u00F3rio</li>\
<li>KAM e GDM (se indicados)</li>\
<li>Hora de encerramento (se o incidente estiver encerrado)</li>\
</ul>\
<p><strong>Resumo:</strong></p>\
<ul>\
<li>Marcadores coloridos com o n\u00FAmero de pacientes em cada categoria</li>\
<li>N\u00FAmero total de pacientes</li>\
</ul>\
<p><strong>Hospitais</strong> (bloco separado para cada hospital com transportes):</p>\
<ul>\
<li>Nome do hospital, n\u00FAmero de pacientes, informa\u00E7\u00E3o de capacidade</li>\
<li>Lista de pacientes com: marcador, idade/sexo, equipa, hora, estado (EM TRANSPORTE / ENTREGUE)</li>\
<li>Hist\u00F3rico de retriagem (ex.: \u21BAT1\u2192T2\u2192T1)</li>\
<li>Hist\u00F3rico de altera\u00E7\u00F5es de hospital (ex.: \u21C4Hospital1\u2192Hospital2)</li>\
<li>Resumo de les\u00F5es</li>\
</ul>\
<p><strong>Pacientes no local</strong> (se algu\u00E9m permanecer):</p>\
<ul>\
<li>Lista com: marcador, idade/sexo, categoria, notas, les\u00F5es</li>\
</ul>\
<h3>Relat\u00F3rio textual</h3>\
<p>O bot\u00E3o \u201C\uD83D\uDCCB Relat\u00F3rio textual\u201D abre uma janela modal com o relat\u00F3rio completo em formato de texto. Cont\u00E9m a lista completa de pacientes com notas, sexo, idade e percurso de triagem.</p>\
<h3>Envio do relat\u00F3rio</h3>\
<ul>\
<li><strong>\uD83D\uDCCB Copiar para a \u00E1rea de transfer\u00EAncia</strong> \u2014 copia o texto completo do relat\u00F3rio</li>\
<li><strong>\uD83D\uDCE4 Enviar</strong> \u2014 abre op\u00E7\u00F5es:\
<ul>\
<li><strong>SMS</strong> \u2014 abre a aplica\u00E7\u00E3o nativa de SMS com o conte\u00FAdo do relat\u00F3rio</li>\
<li><strong>Email</strong> \u2014 abre o cliente de email com o assunto e conte\u00FAdo do relat\u00F3rio</li>\
</ul></li>\
</ul>\
<h3>Encerramento do incidente</h3>\
<p>Bot\u00E3o <strong>ENCERRAR INCIDENTE</strong> no cabe\u00E7alho do relat\u00F3rio:</p>\
<ul>\
<li>Regista a hora de encerramento</li>\
<li>Transforma-se em <strong>REVERTER ENCERRAMENTO</strong> (revers\u00EDvel)</li>\
<li>A hora de encerramento aparece no relat\u00F3rio</li>\
</ul>\
<hr>\
<h2>9. Retriagem e altera\u00E7\u00E3o de hospital</h2>\
<h3>Retriagem</h3>\
<p>No cart\u00E3o do paciente na sec\u00E7\u00E3o \u201CPacientes no local\u201D encontram-se 4 pontos coloridos (T1\u2013T4). Clicar numa categoria diferente da atual:</p>\
<ol>\
<li>Abre uma janela de confirma\u00E7\u00E3o: \u201CAlterar a categoria do paciente P-001 de T1 para T2?\u201D</li>\
<li><strong>CONFIRMAR</strong> \u2014 altera a categoria, regista no hist\u00F3rico</li>\
<li><strong>CANCELAR</strong> \u2014 sem altera\u00E7\u00F5es</li>\
</ol>\
<p>Hist\u00F3rico de retriagem:</p>\
<ul>\
<li>Marcador \u21BAn no cart\u00E3o do paciente (n = n\u00FAmero de altera\u00E7\u00F5es)</li>\
<li>Hist\u00F3rico completo no relat\u00F3rio (ex.: T1\u2192T2\u2192T1 com horas)</li>\
</ul>\
<h3>Altera\u00E7\u00E3o de hospital durante o transporte</h3>\
<p>No cart\u00E3o do paciente \u201CEm transporte\u201D, bot\u00E3o \u201Calterar\u201D:</p>\
<ol>\
<li>Abre uma janela modal com o hospital atual</li>\
<li>Lista pendente com hospitais dispon\u00EDveis (com informa\u00E7\u00E3o de capacidade)</li>\
<li><strong>CONFIRMAR</strong> \u2014 altera o hospital, regista no hist\u00F3rico</li>\
<li><strong>CANCELAR</strong> \u2014 sem altera\u00E7\u00F5es</li>\
</ol>\
<p>O hist\u00F3rico de altera\u00E7\u00F5es de hospital \u00E9 vis\u00EDvel no relat\u00F3rio (\u21C4Hospital1\u2192Hospital2).</p>\
<hr>\
<h2>10. Instala\u00E7\u00E3o e modo offline</h2>\
<h3>Instala\u00E7\u00E3o como PWA</h3>\
<p><strong>Android (Chrome):</strong></p>\
<ol>\
<li>Abra a aplica\u00E7\u00E3o no Chrome</li>\
<li>Toque em \u22EE (menu) no canto superior direito</li>\
<li>Selecione \u201CAdicionar ao ecr\u00E3 inicial\u201D</li>\
<li>Toque em \u201CInstalar\u201D</li>\
</ol>\
<p><strong>iOS (Safari):</strong></p>\
<ol>\
<li>Abra a aplica\u00E7\u00E3o no Safari</li>\
<li>Toque em \u2399 (Partilhar)</li>\
<li>Deslize para baixo e selecione \u201CAdicionar ao ecr\u00E3 inicial\u201D</li>\
</ol>\
<p>Ap\u00F3s a instala\u00E7\u00E3o, a aplica\u00E7\u00E3o funciona como uma aplica\u00E7\u00E3o independente com modo offline completo.</p>\
<h3>Modo offline</h3>\
<p>Ap\u00F3s o primeiro carregamento, a aplica\u00E7\u00E3o \u00E9 guardada na cache do dispositivo. Todas as funcionalidades operam sem liga\u00E7\u00E3o \u00E0 internet:</p>\
<ul>\
<li>Triagem de pacientes</li>\
<li>Despacho de transporte</li>\
<li>Gera\u00E7\u00E3o de relat\u00F3rios</li>\
<li>Importa\u00E7\u00E3o de dados (colagem)</li>\
</ul>\
<p>A internet \u00E9 necess\u00E1ria apenas para: o primeiro download, atualiza\u00E7\u00F5es e envio de SMS/email (atrav\u00E9s das aplica\u00E7\u00F5es nativas do dispositivo).</p>\
<h3>Download como ficheiro HTML</h3>\
<p>O bot\u00E3o <strong>\u2B07 Descarregar</strong> no ecr\u00E3 inicial descarrega a aplica\u00E7\u00E3o como um ficheiro HTML aut\u00F3nomo. Pode ser transferido para uma pen USB e executado em qualquer computador com navegador.</p>\
<hr>\
<h2>11. Privacidade</h2>\
<ul>\
<li>Todos os dados s\u00E3o armazenados <strong>exclusivamente no dispositivo</strong> (localStorage)</li>\
<li>Nenhum dado <strong>\u00E9 enviado</strong> para servidores externos</li>\
<li>Sem anal\u00EDtica, rastreamento ou telemetria</li>\
<li>Sem cookies de rastreamento</li>\
<li>As fun\u00E7\u00F5es de SMS e email utilizam as aplica\u00E7\u00F5es nativas do dispositivo \u2014 a aplica\u00E7\u00E3o n\u00E3o envia mensagens diretamente</li>\
<li>Elimina\u00E7\u00E3o de dados: utilize \u201CEncerrar incidente\u201D ou limpe os dados do navegador</li>\
</ul>\
<p>A pol\u00EDtica de privacidade completa est\u00E1 dispon\u00EDvel em <code>/privacy/</code>.</p>';
